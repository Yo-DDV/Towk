services:
  nats:
    image: nats:2.14.3-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    command: ["--jetstream", "--store_dir=/data", "--auth=${NATS_TOKEN}", "--http_port=8222"]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: ${NATS_MEMORY_LIMIT:-1g}
    cpus: ${NATS_CPU_LIMIT:-1.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  livekit:
    image: livekit/livekit-server:v1.13.3@sha256:483b8b7b5b0654f91f1e8bdc7b46fcd37fd9911612ecf627f97e3185a89825bd
    command:
      - --config
      - /etc/livekit.yaml
    user: "1000:1000"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 512
    mem_limit: ${LIVEKIT_MEMORY_LIMIT:-2g}
    cpus: ${LIVEKIT_CPU_LIMIT:-2.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    ports:
      - "50000-50200:50000-50200/udp"  # WebRTC media (UDP, must be direct)
      - "7881:7881/tcp"  # WebRTC media fallback when UDP is unavailable
      - "3478:3478/udp"  # TURN/STUN relay for NAT traversal
    expose:
      - "7880"  # WebSocket signaling (proxied through Caddy)
    volumes:
      - ${LIVEKIT_CONFIG_FILE:-./livekit.yaml}:/etc/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 5s
      timeout: 3s
      retries: 3

  towk:
    image: ${TOWK_IMAGE:?Set TOWK_IMAGE to an immutable ghcr.io/yo-ddv/towk tag and digest}
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 512
    mem_limit: ${TOWK_MEMORY_LIMIT:-2g}
    cpus: ${TOWK_CPU_LIMIT:-2.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      livekit:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: ${CADDY_MEMORY_LIMIT:-512m}
    cpus: ${CADDY_CPU_LIMIT:-1.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_URL: "${PUBLIC_URL:-chat.example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      towk:
        condition: service_healthy
      livekit:
        condition: service_healthy

volumes:
  nats_data:
  caddy_data:
  caddy_config:
