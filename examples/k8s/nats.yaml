apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: towk
data:
  nats.conf: |
    jetstream {
      store_dir: /data
    }
    authorization {
      token: $NATS_TOKEN
    }
    tls {
      cert_file: /etc/nats/tls/tls.crt
      key_file: /etc/nats/tls/tls.key
    }
    http: "127.0.0.1:8222"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: towk
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
  clusterIP: None # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: towk
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.14.3-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
          args:
            - "--config=/etc/nats/config/nats.conf"
          env:
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: towk-config
                  key: NATS_TOKEN
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tls
              mountPath: /etc/nats/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/nats/config
              readOnly: true
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: nats-tls
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: nats-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
