<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Controla tu espacio de comunicación.</title>
  <desc id="desc">Mensajes, archivos, notificaciones y llamadas — en la infraestructura que tú elijas.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43d8b0"/>
      <stop offset="50%" stop-color="#4aa8ff"/>
      <stop offset="100%" stop-color="#7867f2"/>
    </linearGradient>
    <linearGradient id="accent-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43d8b0" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#7867f2" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .panel-strong { fill: #eef7ff; stroke: #b6d8ff; }
    .ink { fill: #18212f; }
    .muted { fill: #667085; }
    .faint { fill: #98a2b3; }
    .grid { stroke: #dfe5ec; }
    .track { fill: #e7edf3; }
    .title { font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .kpi { font: 800 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { font: 650 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hero-eyebrow { font: 800 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 2px; }
    .hero-title { font: 850 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hero-subtitle { font: 550 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .chip { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .panel-strong { fill: #10263a; stroke: #244d70; }
      .ink { fill: #f0f6fc; }
      .muted { fill: #a7b0bc; }
      .faint { fill: #7d8590; }
      .grid { stroke: #30363d; }
      .track { fill: #27313d; }
    }
  </style>
  <rect class="bg" x="1" y="1" width="1198" height="388" rx="22"/>
  <circle cx="1058" cy="42" r="150" fill="#7867f2" opacity="0.16" filter="url(#glow)"/>
  <circle cx="740" cy="360" r="130" fill="#43d8b0" opacity="0.12" filter="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="10" rx="5" fill="url(#accent)"/>
  <text class="hero-eyebrow" x="48" y="70" fill="#4aa8ff">CENTRADO · AUTOALOJADO · CÓDIGO ABIERTO</text>
<text class="hero-title ink" x="48" y="132" style="font-size:42px">Controla tu espacio de</text>
<text class="hero-title ink" x="48" y="183" style="font-size:42px">comunicación.</text>
<text class="hero-subtitle muted" x="48" y="228" style="font-size:18px">Mensajes, archivos, notificaciones y llamadas — en la</text>
<text class="hero-subtitle muted" x="48" y="255" style="font-size:18px">infraestructura que tú elijas.</text>
<g><rect x="48" y="302" width="128" height="36" rx="18" fill="url(#accent-soft)"/><text class="chip ink" x="112" y="325" text-anchor="middle">Autoalojado</text></g>
<g><rect x="188" y="302" width="150" height="36" rx="18" fill="url(#accent-soft)"/><text class="chip ink" x="263" y="325" text-anchor="middle">PWA instalable</text></g>
<g><rect x="350" y="302" width="138" height="36" rx="18" fill="url(#accent-soft)"/><text class="chip ink" x="419" y="325" text-anchor="middle">Voz y vídeo</text></g>
<g><rect x="500" y="302" width="126" height="36" rx="18" fill="url(#accent-soft)"/><text class="chip ink" x="563" y="325" text-anchor="middle">Código abierto</text></g>
  <g transform="translate(760 58)">
    <rect class="panel" x="0" y="0" width="415" height="275" rx="24"/>
    <rect x="20" y="20" width="104" height="235" rx="18" fill="#7867f2" opacity="0.13"/>
    <circle cx="48" cy="58" r="10" fill="#43d8b0"/>
