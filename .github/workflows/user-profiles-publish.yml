name: user profiles publish

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/user-profiles-publish.yml

permissions:
  contents: write

concurrency:
  group: user-profiles-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.actor == 'Yo-DDV' &&
      github.repository == 'Yo-DDV/Towk' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SOURCE_PATCH_CHUNKS: >-
        2e24dae959c24d4ad97a8e1e4c253a834229445f
        8653126472b87f61e0c82a5b19ccf4d33843031f
        25b40ce9b782dae5a8b380d160a22405821e1589
        bc8818f6ad2b00bfb31b8906215dcf28a54a4cc6
        faca544204c5b57e1395c100ab7b70cfb07b4e00
        f02ed5aaa214d4ce2b0732f5397879d93faa266f
        30de0032685fcfa6c54a9365eb148d831dcbb626
        438f2ad245bb2728dac00e0272514a5fecee4d55
      SOURCE_PATCH_ARCHIVE_SHA256: d18233a45a1f2cd2825102158340d206d0b011ac58dd658ed106da07a5d036f9
    steps:
      - name: Check out publication branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up repository toolchain
        uses: ./.github/actions/setup

      - name: Materialize reviewed profile implementation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          encoded_patch="${RUNNER_TEMP}/user-profiles-source.patch.xz.b64"
          : > "${encoded_patch}"
          for source_sha in ${SOURCE_PATCH_CHUNKS}; do
            curl --fail --silent --show-error \
              --retry 3 \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${source_sha}" \
              | jq -r '.content' | tr -d '\n' | base64 --decode >> "${encoded_patch}"
          done
          base64 --decode "${encoded_patch}" > "${RUNNER_TEMP}/user-profiles-source.patch.xz"
          printf '%s  %s\n' "${SOURCE_PATCH_ARCHIVE_SHA256}" "${RUNNER_TEMP}/user-profiles-source.patch.xz" \
            | sha256sum --check --strict
          xz --decompress --stdout "${RUNNER_TEMP}/user-profiles-source.patch.xz" \
            > "${RUNNER_TEMP}/user-profiles-source.patch"
          git apply --check "${RUNNER_TEMP}/user-profiles-source.patch"
          git apply --index "${RUNNER_TEMP}/user-profiles-source.patch"

      - name: Generate protobuf bindings
        shell: bash
        run: |
          set -euo pipefail
          mise codegen-proto

      - name: Verify focused backend packages
        shell: bash
        run: |
          set -euo pipefail
          cd cli
          go test -trimpath -race ./internal/core -run 'UserProfile|LastActivity|Biography|UserPreferences|SetUserPreferences'
          go test -trimpath -race ./internal/connectapi -run 'UserProfile|Account|Viewer'
          go test -trimpath -race ./internal/http_server -run 'Realtime|UserProfile'

      - name: Prepare final branch tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/user-profiles-source-snapshot.yml
          rm -f .github/workflows/user-profiles-publish.yml
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          test -z "$(git diff --cached --name-only | grep -E '(^|/)(\.env|\.mcp\.json|\.agents|\.claude|\.codex|SESSION_LOG|QUESTION_SESSION|SKILL_AUDIT)' || true)"

      - name: Commit and publish implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git commit -m "feat(profiles): add complete user profiles"
          test "$(git log -1 --format=%an)" = "${GITHUB_ACTOR}"
          test "$(git log -1 --format=%cn)" = "${GITHUB_ACTOR}"
          ! git log -1 --format=%B | grep -Eiq '^(Co-authored-by|Generated-by|Assisted-by|Pair-programmed-by):'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
