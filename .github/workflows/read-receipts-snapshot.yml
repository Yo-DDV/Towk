name: read-receipts source publish probe

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: read-receipts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Report exact head and root tree
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          tree_sha="$(curl --fail --silent --show-error --location \
            --retry 3 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/commits/${HEAD_SHA}" \
            | jq -er '.tree.sha')"
          printf 'head=%s\n' "${HEAD_SHA}"
          printf 'tree=%s\n' "${tree_sha}"
