name: read-receipts source publish probe

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: read-receipts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Report exact head and root tree
        shell: bash
        run: |
          set -euo pipefail
          printf 'head=%s\n' "$(git rev-parse HEAD)"
          printf 'tree=%s\n' "$(git show -s --format=%T HEAD)"
          git status --short
