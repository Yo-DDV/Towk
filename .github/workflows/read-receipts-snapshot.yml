name: read-receipts workspace snapshot

on:
  push:
    branches:
      - feat/read-receipts
    paths:
      - .github/workflows/read-receipts-snapshot.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create source snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=towk-source.tar.gz -czf towk-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-read-receipts-source
          path: towk-source.tar.gz
          retention-days: 1
          if-no-files-found: error
