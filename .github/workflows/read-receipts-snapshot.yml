name: read-receipts development gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: read-receipts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    env:
      PATCH_GZIP_BLOB_SHAS: >-
        a7b0cb8f7f6a55ecc1421462ffe11c6d90d542f4
        4e0f9c01edc062b18e828cdf6f0b14ad048e34e1
        3ff9fdec2d5c004fc00fc044aa6d85c650f1a1bc
        a90423d1f7d266dd30280f74786fbce749ffe796
      PATCH_GZIP_SHA256: 4d6e91dd004d02dd4f5e9d72d868aa3d526f5b4301c50ddfe402eb681ea48b60
      PATCH_SHA256: 8d5b2a940b6c1ebbd9726e074deabe33c01995fd118711084068550c082c7eec
    steps:
      - name: Check out pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up repository toolchain
        uses: ./.github/actions/setup

      - name: Capture baseline protobuf lint debt
        shell: bash
        run: |
          set -euo pipefail
          cd proto
          set +e
          buf lint > "${RUNNER_TEMP}/read-receipts-buf-baseline.raw" 2>&1
          status=$?
          set -e
          sed -E 's/^([^:]+):[0-9]+:[0-9]+:/\1:/' "${RUNNER_TEMP}/read-receipts-buf-baseline.raw" \
            | sort > "${RUNNER_TEMP}/read-receipts-buf-baseline.normalized"
          printf '%s\n' "${status}" > "${RUNNER_TEMP}/read-receipts-buf-baseline.status"

      - name: Materialize reviewed source patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/read-receipts-source.patch.gz"
          patch="${RUNNER_TEMP}/read-receipts-source.patch"
          : > "${archive}"

          for sha in ${PATCH_GZIP_BLOB_SHAS}; do
            chunk="${RUNNER_TEMP}/read-receipts-${sha}.chunk"
            curl --fail --silent --show-error --location \
              --retry 3 \
              --header "Accept: application/vnd.github.raw+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" \
              > "${chunk}"
            test "$(git hash-object "${chunk}")" = "${sha}"
            cat "${chunk}" >> "${archive}"
          done

          printf '%s  %s\n' "${PATCH_GZIP_SHA256}" "${archive}" | sha256sum --check --strict
          gzip -dc "${archive}" > "${patch}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${patch}" | sha256sum --check --strict
          git apply --check "${patch}"
          git apply "${patch}"

          gofmt -w \
            cli/internal/connectapi/account.go \
            cli/internal/connectapi/api_test.go \
            cli/internal/connectapi/errors.go \
            cli/internal/connectapi/read_state.go \
            cli/internal/connectapi/server.go \
            cli/internal/connectapi/server_state.go \
            cli/internal/connectapi/viewer.go \
            cli/internal/core/config_manager.go \
            cli/internal/core/config_manager_test.go \
            cli/internal/core/config_projection.go \
            cli/internal/core/core_test.go \
            cli/internal/core/errors.go \
            cli/internal/core/my_events_model.go \
            cli/internal/core/read_receipts.go \
            cli/internal/core/read_receipts_test.go \
            cli/internal/core/rooms.go \
            cli/internal/core/server_state_management.go \
            cli/internal/core/user_preferences.go \
            cli/internal/core/user_preferences_test.go \
            cli/internal/core/users.go \
            cli/internal/http_server/realtime.go \
            cli/internal/http_server/realtime_test.go

      - name: Generate protobuf bindings
        id: codegen
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mise codegen-proto 2>&1 | tee "${RUNNER_TEMP}/read-receipts-codegen.log"

      - name: Verify protobuf build and lint drift
        id: proto
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cd proto
          buf build
          buf lint \
            --path chatto/admin/v1/server.proto \
            --path chatto/api/v1/account.proto \
            --path chatto/api/v1/read_state.proto \
            --path chatto/api/v1/viewer.proto \
            --path chatto/config/v1/config.proto \
            --path chatto/core/v1/config_events.proto \
            --path chatto/core/v1/event.proto \
            --path chatto/core/v1/live_events.proto \
            --path chatto/core/v1/read_receipts.proto \
            --path chatto/core/v1/user_events.proto \
            --path chatto/core/v1/user_preferences.proto \
            --path chatto/realtime/v1/realtime.proto

          set +e
          buf lint > "${RUNNER_TEMP}/read-receipts-buf-current.raw" 2>&1
          current_status=$?
          set -e
          sed -E 's/^([^:]+):[0-9]+:[0-9]+:/\1:/' "${RUNNER_TEMP}/read-receipts-buf-current.raw" \
            | sort > "${RUNNER_TEMP}/read-receipts-buf-current.normalized"
          baseline_status="$(cat "${RUNNER_TEMP}/read-receipts-buf-baseline.status")"
          test "${current_status}" = "${baseline_status}"
          diff -u \
            "${RUNNER_TEMP}/read-receipts-buf-baseline.normalized" \
            "${RUNNER_TEMP}/read-receipts-buf-current.normalized" \
            | tee "${RUNNER_TEMP}/read-receipts-buf-drift.log"

      - name: Compile affected backend packages
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd cli
          go test -trimpath ./internal/core ./internal/connectapi ./internal/http_server -run '^$' 2>&1 \
            | tee "${RUNNER_TEMP}/read-receipts-compile.log"

      - name: Run targeted backend tests under race
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cd cli
          go test -trimpath -race ./internal/core \
            -run '^(TestReadReceiptModel_|TestCompactReadReceiptIntervals|TestChattoCore_GetUserSettings_NoSettings|TestChattoCore_UpdateUserSettings_|TestChattoCore_DeleteUser_CleansUpSettings)$' \
            -count=1 2>&1 | tee "${RUNNER_TEMP}/read-receipts-core.log"
          go test -trimpath -race ./internal/connectapi \
            -run '^(TestRoomServiceReadReceipts|TestServerDiscoveryServiceGetServerPublicMetadata)' \
            -count=1 2>&1 | tee "${RUNNER_TEMP}/read-receipts-connectapi.log"
          go test -trimpath -race ./internal/http_server \
            -run '^(TestRealtimeMapperMapsReadReceiptAdvance|TestRealtimeMapperIncludesReadReceiptPreference)$' \
            -count=1 2>&1 | tee "${RUNNER_TEMP}/read-receipts-http-server.log"

      - name: Vet affected backend packages
        id: vet
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd cli
          go vet ./internal/core ./internal/connectapi ./internal/http_server 2>&1 \
            | tee "${RUNNER_TEMP}/read-receipts-vet.log"

      - name: Check generated and formatted diff
        id: diff
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee "${RUNNER_TEMP}/read-receipts-diff.log"

      - name: Build candidate Git tree
        id: candidate
        if: ${{ steps.codegen.outcome == 'success' && steps.proto.outcome == 'success' && steps.compile.outcome == 'success' && steps.backend.outcome == 'success' && steps.vet.outcome == 'success' && steps.diff.outcome == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base_tree="$(git show -s --format=%T HEAD)"
          files="${RUNNER_TEMP}/read-receipts-candidate-files.txt"
          entries="${RUNNER_TEMP}/read-receipts-candidate-entries.json"
          response="${RUNNER_TEMP}/read-receipts-candidate-tree.json"

          {
            git diff --name-only --diff-filter=ACMRTUXB
            git ls-files --others --exclude-standard
          } | awk 'NF && !seen[$0]++' | sort > "${files}"
          test -s "${files}"
          printf '[]' > "${entries}"

          while IFS= read -r path; do
            test -f "${path}"
            encoded="$(base64 -w0 "${path}")"
            blob_sha="$({
              jq -n --arg content "${encoded}" '{content: $content, encoding: "base64"}' \
                | curl --fail --silent --show-error --location \
                    --retry 3 \
                    --request POST \
                    --header "Accept: application/vnd.github+json" \
                    --header "Authorization: Bearer ${GH_TOKEN}" \
                    --header "X-GitHub-Api-Version: 2022-11-28" \
                    --data-binary @- \
                    "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs" \
                | jq -er '.sha'
            })"
            jq --arg path "${path}" --arg sha "${blob_sha}" \
              '. + [{path: $path, mode: "100644", type: "blob", sha: $sha}]' \
              "${entries}" > "${entries}.next"
            mv "${entries}.next" "${entries}"
          done < "${files}"

          jq -n --arg base_tree "${base_tree}" --slurpfile tree "${entries}" \
            '{base_tree: $base_tree, tree: $tree[0]}' \
            | curl --fail --silent --show-error --location \
                --retry 3 \
                --request POST \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer ${GH_TOKEN}" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                --data-binary @- \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/trees" \
            | tee "${response}"

          printf 'tree_sha=%s\n' "$(jq -er '.sha' "${response}")" >> "${GITHUB_OUTPUT}"
          printf 'head_sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Record development gate status
        if: ${{ always() }}
        shell: bash
        env:
          CODEGEN_OUTCOME: ${{ steps.codegen.outcome }}
          PROTO_OUTCOME: ${{ steps.proto.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          VET_OUTCOME: ${{ steps.vet.outcome }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
          CANDIDATE_OUTCOME: ${{ steps.candidate.outcome }}
          CANDIDATE_TREE_SHA: ${{ steps.candidate.outputs.tree_sha }}
          CANDIDATE_HEAD_SHA: ${{ steps.candidate.outputs.head_sha }}
        run: |
          {
            printf 'codegen=%s\n' "${CODEGEN_OUTCOME}"
            printf 'proto=%s\n' "${PROTO_OUTCOME}"
            printf 'compile=%s\n' "${COMPILE_OUTCOME}"
            printf 'backend=%s\n' "${BACKEND_OUTCOME}"
            printf 'vet=%s\n' "${VET_OUTCOME}"
            printf 'diff=%s\n' "${DIFF_OUTCOME}"
            printf 'candidate=%s\n' "${CANDIDATE_OUTCOME}"
            printf 'candidate_tree=%s\n' "${CANDIDATE_TREE_SHA}"
            printf 'head_sha=%s\n' "${CANDIDATE_HEAD_SHA}"
          } > "${RUNNER_TEMP}/read-receipts-status.txt"

      - name: Create generated workspace snapshot
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "${RUNNER_TEMP}/towk-read-receipts-workspace.tar.gz" .

      - name: Upload generated workspace, candidate tree, and logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-read-receipts-workspace
          path: |
            ${{ runner.temp }}/towk-read-receipts-workspace.tar.gz
            ${{ runner.temp }}/read-receipts-*.log
            ${{ runner.temp }}/read-receipts-buf-*.raw
            ${{ runner.temp }}/read-receipts-buf-*.normalized
            ${{ runner.temp }}/read-receipts-buf-baseline.status
            ${{ runner.temp }}/read-receipts-candidate-files.txt
            ${{ runner.temp }}/read-receipts-candidate-tree.json
            ${{ runner.temp }}/read-receipts-status.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Enforce development gate
        if: ${{ always() }}
        shell: bash
        env:
          CODEGEN_OUTCOME: ${{ steps.codegen.outcome }}
          PROTO_OUTCOME: ${{ steps.proto.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          VET_OUTCOME: ${{ steps.vet.outcome }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
          CANDIDATE_OUTCOME: ${{ steps.candidate.outcome }}
        run: |
          test "${CODEGEN_OUTCOME}" = success
          test "${PROTO_OUTCOME}" = success
          test "${COMPILE_OUTCOME}" = success
          test "${BACKEND_OUTCOME}" = success
          test "${VET_OUTCOME}" = success
          test "${DIFF_OUTCOME}" = success
          test "${CANDIDATE_OUTCOME}" = success
