name: user profiles development gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: user-profiles-development-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    env:
      SOURCE_PATCH_CHUNKS: >-
        2e24dae959c24d4ad97a8e1e4c253a834229445f
        8653126472b87f61e0c82a5b19ccf4d33843031f
        25b40ce9b782dae5a8b380d160a22405821e1589
        bc8818f6ad2b00bfb31b8906215dcf28a54a4cc6
        faca544204c5b57e1395c100ab7b70cfb07b4e00
        f02ed5aaa214d4ce2b0732f5397879d93faa266f
        30de0032685fcfa6c54a9365eb148d831dcbb626
        438f2ad245bb2728dac00e0272514a5fecee4d55
      SOURCE_PATCH_ARCHIVE_SHA256: d18233a45a1f2cd2825102158340d206d0b011ac58dd658ed106da07a5d036f9
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up repository toolchain
        uses: ./.github/actions/setup

      - name: Materialize reviewed source patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          encoded_patch="${RUNNER_TEMP}/user-profiles-source.patch.xz.b64"
          : > "${encoded_patch}"
          for source_sha in ${SOURCE_PATCH_CHUNKS}; do
            curl --fail --silent --show-error \
              --retry 3 \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${source_sha}" \
              | jq -r '.content' | tr -d '\n' | base64 --decode >> "${encoded_patch}"
          done
          base64 --decode "${encoded_patch}" > "${RUNNER_TEMP}/user-profiles-source.patch.xz"
          printf '%s  %s\n' "${SOURCE_PATCH_ARCHIVE_SHA256}" "${RUNNER_TEMP}/user-profiles-source.patch.xz" \
            | sha256sum --check --strict
          xz --decompress --stdout "${RUNNER_TEMP}/user-profiles-source.patch.xz" \
            > "${RUNNER_TEMP}/user-profiles-source.patch"
          git apply --index "${RUNNER_TEMP}/user-profiles-source.patch"

      - name: Generate protobuf bindings
        id: codegen
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mise codegen-proto 2>&1 | tee "${RUNNER_TEMP}/user-profiles-codegen.log"

      - name: Lint protobuf API
        id: proto_lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd proto
          buf lint 2>&1 | tee "${RUNNER_TEMP}/user-profiles-buf-lint.log"

      - name: Run targeted backend tests
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd cli
          go test -trimpath -race ./internal/core ./internal/connectapi ./internal/http_server 2>&1 \
            | tee "${RUNNER_TEMP}/user-profiles-backend.log"

      - name: Check formatted diff
        id: diff
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee "${RUNNER_TEMP}/user-profiles-diff.log"

      - name: Record development gate status
        if: ${{ always() }}
        shell: bash
        env:
          CODEGEN_OUTCOME: ${{ steps.codegen.outcome }}
          PROTO_LINT_OUTCOME: ${{ steps.proto_lint.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
        run: |
          {
            printf 'codegen=%s\n' "${CODEGEN_OUTCOME}"
            printf 'proto_lint=%s\n' "${PROTO_LINT_OUTCOME}"
            printf 'backend=%s\n' "${BACKEND_OUTCOME}"
            printf 'diff=%s\n' "${DIFF_OUTCOME}"
            printf 'sha=%s\n' "${GITHUB_SHA}"
            printf 'tree=%s\n' "$(git show -s --format=%T HEAD)"
          } > "${RUNNER_TEMP}/user-profiles-status.txt"
          git status --short > "${RUNNER_TEMP}/user-profiles-git-status.txt"
          git diff --binary > "${RUNNER_TEMP}/user-profiles-generated.diff"

      - name: Archive generated bindings
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${RUNNER_TEMP}/towk-user-profiles-generated.tar.gz" \
            cli/internal/pb \
            packages/api-types/src \
            apps/docs-website/src/generated/connectrpc-api

      - name: Upload generated bindings and logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-user-profiles-generated
          path: |
            ${{ runner.temp }}/towk-user-profiles-generated.tar.gz
            ${{ runner.temp }}/user-profiles-codegen.log
            ${{ runner.temp }}/user-profiles-buf-lint.log
            ${{ runner.temp }}/user-profiles-backend.log
            ${{ runner.temp }}/user-profiles-diff.log
            ${{ runner.temp }}/user-profiles-status.txt
            ${{ runner.temp }}/user-profiles-git-status.txt
            ${{ runner.temp }}/user-profiles-generated.diff
          retention-days: 1
          if-no-files-found: error

      - name: Enforce development gate
        if: ${{ always() }}
        shell: bash
        env:
          CODEGEN_OUTCOME: ${{ steps.codegen.outcome }}
          PROTO_LINT_OUTCOME: ${{ steps.proto_lint.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
        run: |
          test "${CODEGEN_OUTCOME}" = success
          test "${PROTO_LINT_OUTCOME}" = success
          test "${BACKEND_OUTCOME}" = success
          test "${DIFF_OUTCOME}" = success
