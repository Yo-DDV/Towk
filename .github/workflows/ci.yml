name: full CI (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  public-surface-check:
    name: public-surface-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup project Node.js
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
          install-frontend-deps: "false"

      - name: Check public product surfaces
        run: mise public-surface-check

  distribution-config-check:
    name: distribution-config-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pinned release tools
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
          install-frontend-deps: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Validate workflows, archives, scripts, and image definitions
        shell: bash
        run: |
          set -euo pipefail
          goreleaser check
          actionlint .github/workflows/*.yml
          bash -n tools/verify-compose-project-name.sh tools/verify-release-archives.sh tools/runtime-image-process.sh tools/runtime-image-process_test.sh tools/verify-runtime-image.sh docker/docker-entrypoint.sh
          bash tools/verify-compose-project-name.sh
          docker buildx build --check --build-arg TARGETARCH=amd64 -f docker/Dockerfile.goreleaser .
          docker buildx build --check --build-arg TARGETARCH=amd64 -f docker/Dockerfile.towk .

  license-check:
    name: license-check
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # zizmor: ignore[cache-poisoning] v4; CI only verifies source
        with:
          experimental: true

      - name: Check license metadata
        run: mise license-check

  codegen-proto-drift:
    name: codegen-proto-drift
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Fetch protobuf breaking base
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${base_ref}:refs/remotes/origin/${base_ref}"

      - name: Check storage and internal protobuf breaking changes
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          cd proto
          mise x -- buf breaking . --against "../.git#branch=origin/${base_ref},subdir=proto" \
            --exclude-imports \
            --exclude-path chatto/api/v1 \
            --exclude-path chatto/admin/v1 \
            --exclude-path chatto/operator/v1 \
            --exclude-path chatto/realtime/v1

      - name: Check public API protobuf breaking changes
        if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'api-breaking-change') }}
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          cd proto
          mise x -- buf breaking . --against "../.git#branch=origin/${base_ref},subdir=proto" \
            --path chatto/api/v1 \
            --path chatto/admin/v1 \
            --path chatto/operator/v1 \
            --path chatto/realtime/v1

      - name: Acknowledge intentional public API protobuf breaking changes
        if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'api-breaking-change') }}
        run: |
          echo "::notice::Skipping public API Buf breaking check because this PR has the api-breaking-change label. Storage/internal protobuf breaking checks and codegen drift are still checked."

      - name: Regenerate protobuf bindings
        run: mise codegen-proto

      - name: Check generated protobuf bindings are current
        run: |
          if ! git diff --exit-code; then
            git status --short
            exit 1
          fi

  test-frontend-unit:
    name: test-frontend-unit
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # zizmor: ignore[cache-poisoning] v5; PR caches are ref-scoped and CI publishes no runtime artifacts
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd apps/frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 15

      - name: Run frontend typecheck
        run: pnpm run check:frontend

      - name: Run frontend lint
        run: pnpm run lint:frontend

      - name: Run frontend unit tests
        run: pnpm run test:frontend

  test-cli:
    name: test-cli
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build frontend
        run: mise build-frontend

      - name: Run Go tests
        run: cd cli && go test -trimpath -p 1 -tags test_endpoints ./...

  test-e2e:
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    name: test-e2e (${{ matrix.shard }}/4)
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # zizmor: ignore[cache-poisoning] v5; PR caches are ref-scoped and CI publishes no runtime artifacts
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd apps/frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 15

      - name: Build E2E server
        run: mise build-e2e-server

      - name: Run E2E tests
        env:
          SHARD: ${{ matrix.shard }}
        run: cd apps/frontend && pnpm exec playwright test --grep-invert @ffmpeg --shard="${SHARD}/4"

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.shard }}-of-4
          path: apps/frontend/playwright-report/
          retention-days: 14

  test-e2e-media:
    name: test-e2e-media
    # runs-on: ubicloud-standard-4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-ffmpeg: "true"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # zizmor: ignore[cache-poisoning] v5; PR caches are ref-scoped and CI publishes no runtime artifacts
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright dependencies
        run: cd apps/frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 15

      - name: Build E2E server
        run: mise build-e2e-server

      - name: Run media E2E tests
        run: cd apps/frontend && pnpm exec playwright test --grep @ffmpeg

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() }}
        with:
          name: playwright-report-media
          path: apps/frontend/playwright-report/
          retention-days: 14

  test-native-file-clipboard:
    name: native-file-clipboard (${{ matrix.os }})
    env:
      # Keep mise tasks from re-installing every repository tool after the
      # portable Go/Node toolchain has been selected below.
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: chromium,firefox
            browsers: chromium firefox
            cache_path: ~/.cache/ms-playwright
          - os: windows-latest
            targets: chrome,msedge,firefox
            browsers: firefox
            cache_path: ~/AppData/Local/ms-playwright
          - os: macos-latest
            targets: chromium,firefox,webkit
            browsers: chromium firefox webkit
            cache_path: ~/Library/Caches/ms-playwright
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          # This job needs only the portable Go/Node toolchain. Installing every
          # repository tool would request LiveKit, which has no macOS binary.
          mise-install-args: go node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # zizmor: ignore[cache-poisoning] v5; PR caches are ref-scoped and CI publishes no runtime artifacts
        with:
          path: ${{ matrix.cache_path }}
          key: native-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            native-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Linux clipboard and browser dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xclip xvfb
          cd apps/frontend
          pnpm exec playwright install ${{ matrix.browsers }} --with-deps
        timeout-minutes: 20

      - name: Install Playwright browsers
        if: runner.os != 'Linux'
        run: cd apps/frontend && pnpm exec playwright install ${{ matrix.browsers }}
        timeout-minutes: 20

      - name: Build E2E server
        run: mise build-e2e-server

      - name: Run native clipboard test on Linux
        if: runner.os == 'Linux'
        env:
          NATIVE_CLIPBOARD_TARGETS: ${{ matrix.targets }}
        run: xvfb-run -a -s '-screen 0 1440x900x24' pnpm --dir apps/frontend run test:e2e:native-clipboard

      - name: Run native clipboard test
        if: runner.os != 'Linux'
        env:
          NATIVE_CLIPBOARD_TARGETS: ${{ matrix.targets }}
        run: pnpm --dir apps/frontend run test:e2e:native-clipboard

      - name: Upload native clipboard report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() }}
        with:
          name: native-clipboard-report-${{ runner.os }}
          path: apps/frontend/playwright-report-native/
          retention-days: 14
