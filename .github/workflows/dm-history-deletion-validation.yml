# Temporary feature verification; remove before review handoff.
name: DM history deletion validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dm-history-deletion-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          install-frontend-deps: "false"
          mise-install-args: "go"
      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.go')
          if ((${#files[@]})); then
            unformatted="$(gofmt -l "${files[@]}")"
            test -z "${unformatted}" || { printf '%s\n' "${unformatted}"; exit 1; }
          fi
      - name: Run targeted backend tests
        shell: bash
        run: |
          set -o pipefail
          cd cli
          go test -trimpath -p 1 ./internal/core ./internal/connectapi ./internal/http_server 2>&1 | tee "${RUNNER_TEMP}/backend-tests.log"
      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dm-history-backend-log
          path: ${{ runner.temp }}/backend-tests.log
          retention-days: 1
          if-no-files-found: warn
      - name: Run DM history race tests
        shell: bash
        run: |
          cd cli
          go test -trimpath -race -count=1 ./internal/core -run 'Test(ForgetOneToOneDM|StartDMRestoresVisibility|RepeatedDMDeletion)'

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
          mise-install-args: "node"
      - name: Install Playwright Chromium
        run: cd apps/frontend && pnpm exec playwright install chromium --with-deps
        timeout-minutes: 15
      - name: Typecheck frontend
        run: pnpm run check:frontend
      - name: Lint frontend
        run: pnpm run lint:frontend
      - name: Run frontend unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm run test:frontend 2>&1 | tee "${RUNNER_TEMP}/frontend-tests.log"
      - name: Upload frontend test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dm-history-frontend-log
          path: ${{ runner.temp }}/frontend-tests.log
          retention-days: 1
          if-no-files-found: warn

  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
      - name: Run public surface and licence checks
        run: |
          mise public-surface-check
          mise license-check
      - name: Check diff hygiene
        run: git diff --check origin/${{ github.base_ref }}...HEAD
