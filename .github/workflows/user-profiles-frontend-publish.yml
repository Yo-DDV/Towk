name: user profiles frontend publish

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/user-profiles-frontend-publish.yml

permissions:
  contents: write

concurrency:
  group: user-profiles-frontend-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.actor == 'Yo-DDV' &&
      github.repository == 'Yo-DDV/Towk' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FRONTEND_PATCH_BLOB: 7db4f827f20ebe7f8cc0429be4c73337d4fcf9f4
      FRONTEND_PATCH_SHA256: e23fa55fa49a4816b800210cb15a5feffed4c01d3856c74c67badfb628e93bd6
    steps:
      - name: Check out profile branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up repository toolchain
        uses: ./.github/actions/setup

      - name: Materialize reviewed frontend implementation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 3 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${FRONTEND_PATCH_BLOB}" \
            | jq -r '.content' | tr -d '\n' | base64 --decode \
            > "${RUNNER_TEMP}/user-profiles-frontend.patch.xz.b64"
          base64 --decode "${RUNNER_TEMP}/user-profiles-frontend.patch.xz.b64" \
            > "${RUNNER_TEMP}/user-profiles-frontend.patch.xz"
          printf '%s  %s\n' "${FRONTEND_PATCH_SHA256}" "${RUNNER_TEMP}/user-profiles-frontend.patch.xz" \
            | sha256sum --check --strict
          xz --decompress --stdout "${RUNNER_TEMP}/user-profiles-frontend.patch.xz" \
            > "${RUNNER_TEMP}/user-profiles-frontend.patch"
          git apply --check "${RUNNER_TEMP}/user-profiles-frontend.patch"
          git apply --index "${RUNNER_TEMP}/user-profiles-frontend.patch"

      - name: Build generated frontend contracts
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- pnpm --filter @towk/api-types build
          cd apps/frontend
          node --test scripts/i18n-facade-parser.test.mjs
          node scripts/check-i18n-catalogs.mjs
          mise exec -- pnpm exec paraglide-js compile \
            --project ./project.inlang \
            --outdir ./src/lib/paraglide \
            --strategy localStorage preferredLanguage baseLocale \
            --emit-ts-declarations \
            --output-structure locale-modules \
            --silent
          node scripts/generate-i18n-facade.mjs
          mise exec -- pnpm exec svelte-kit sync

      - name: Check frontend types and targeted tests
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- pnpm --dir apps/frontend exec svelte-check --tsconfig ./tsconfig.json
          mise exec -- pnpm --dir apps/frontend exec vitest --run --project server \
            src/lib/profileBiography.spec.ts \
            src/lib/api-client-tests/account.spec.ts \
            src/lib/api-client-tests/memberDirectory.spec.ts \
            src/lib/api-client-tests/viewer.spec.ts

      - name: Check profile component in Chromium
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mise exec -- pnpm --dir apps/frontend exec playwright install chromium 2>&1 \
            | tee "${RUNNER_TEMP}/user-profiles-browser.log"
          mise exec -- pnpm --dir apps/frontend exec vitest --run --project client \
            src/lib/components/menus/UserContextMenu.svelte.spec.ts 2>&1 \
            | tee -a "${RUNNER_TEMP}/user-profiles-browser.log"

      - name: Upload browser diagnostic
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: user-profiles-browser-diagnostic
          path: ${{ runner.temp }}/user-profiles-browser.log
          retention-days: 1
          if-no-files-found: error

      - name: Check changed frontend source
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- pnpm --dir apps/frontend exec eslint \
            src/lib/api-client/account.ts \
            src/lib/api-client/memberDirectory.ts \
            src/lib/api-client/viewer.ts \
            src/lib/dm/startDM.ts \
            src/lib/profileBiography.ts \
            src/lib/profileBiography.spec.ts \
            src/lib/components/menus/UserContextMenu.svelte \
            src/lib/components/menus/UserContextMenu.svelte.spec.ts \
            src/lib/components/settings/ProfileDetailsSettings.svelte \
            src/routes/settings/+page.svelte

      - name: Enforce browser verification
        shell: bash
        env:
          BROWSER_OUTCOME: ${{ steps.browser.outcome }}
        run: test "${BROWSER_OUTCOME}" = success

      - name: Prepare final branch tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/user-profiles-frontend-publish.yml
          rm -f .profile-frontend-patch.b64
          git add -A
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          test -z "$(git diff --cached --name-only | grep -E '(^|/)(\.env|\.mcp\.json|\.agents|\.claude|\.codex|SESSION_LOG|QUESTION_SESSION|SKILL_AUDIT)' || true)"

      - name: Commit and publish frontend implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git commit -m "feat(frontend): add complete profile experience"
          test "$(git log -1 --format=%an)" = "${GITHUB_ACTOR}"
          test "$(git log -1 --format=%cn)" = "${GITHUB_ACTOR}"
          ! git log -1 --format=%B | grep -Eiq '^(Co-authored-by|Generated-by|Assisted-by|Pair-programmed-by):'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
