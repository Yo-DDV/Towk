name: prepare release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prepare-release-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release pull request
    if: github.repository == 'Yo-DDV/towk'
    permissions:
      contents: write # Update the release manifest and changelog branch.
      issues: write # Maintain release labels and linked issue metadata.
      pull-requests: write # Create or update the release pull request.
    runs-on: ubuntu-latest
    steps:
      - name: Create or update the release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
