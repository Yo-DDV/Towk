name: user profiles finalization

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/user-profiles-recovery.yml

permissions:
  contents: write

concurrency:
  group: user-profiles-finalization-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out profile branch
        uses: actions/checkout@9c091bb21b7c1c1d1991b90d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/user-profiles
          fetch-depth: 0
          persist-credentials: true

      - name: Verify expected head and authorship source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "19abe3b937b54201c8e038f6e8ad5c33fb13efdb"
          test "$(git show -s --format=%an HEAD)" != ""
          test "$(git show -s --format=%ae HEAD)" != ""

