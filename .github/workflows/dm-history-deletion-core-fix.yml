# Triggered after creation so the PR synchronize event sees this workflow.
name: DM history deletion core fix

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: dm-history-deletion-core-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feat/dm-history-deletion'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/dm-history-deletion
          fetch-depth: 0
          persist-credentials: true
      - uses: ./.github/actions/setup
      - name: Enforce membership and pending upload access
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('cli/internal/core/dm_history.go')
          text = path.read_text()
          text = text.replace('"fmt"\n', '"fmt"\n\t"time"\n', 1)
          old = '''func (c *ChattoCore) CanAccessDMAsset(ctx context.Context, actorID, roomID, assetID string) (bool, error) {
	if room, err := c.GetRoom(ctx, KindDM, roomID); err != nil || room == nil {
		return false, err
	}
	cutoffSeq, hasCutoff, err := c.DMHistoryCutoffSequence(ctx, actorID, roomID)
'''
          new = '''func (c *ChattoCore) CanAccessDMAsset(ctx context.Context, actorID, roomID, assetID string) (bool, error) {
	if room, err := c.GetRoom(ctx, KindDM, roomID); err != nil || room == nil {
		return false, err
	}
	isMember, err := c.RoomMembershipExists(ctx, KindDM, actorID, roomID)
	if err != nil || !isMember {
		return false, err
	}
	cutoffSeq, hasCutoff, err := c.DMHistoryCutoffSequence(ctx, actorID, roomID)
'''
          if old not in text:
              raise SystemExit('DM asset access marker not found')
          text = text.replace(old, new, 1)
          old = '''	parentID := declared.GetParentAssetId()
	if parentID != "" && parentID != assetID {
		return c.CanAccessDMAsset(ctx, actorID, roomID, parentID)
	}
	return false, nil
'''
          new = '''	parentID := declared.GetParentAssetId()
	if parentID != "" && parentID != assetID {
		return c.CanAccessDMAsset(ctx, actorID, roomID, parentID)
	}
	pendingExpiresAt := declared.GetPendingExpiresAt()
	if declared.GetRoomId() == roomID && declared.GetUserId() == actorID &&
		pendingExpiresAt != nil && pendingExpiresAt.AsTime().After(time.Now()) {
		return true, nil
	}
	return false, nil
'''
          if old not in text:
              raise SystemExit('pending asset marker not found')
          path.write_text(text)

          path = Path('cli/internal/core/dm_history_test.go')
          text = path.read_text()
          text = text.replace(
              'import (\n\t"context"\n\t"errors"\n\t"testing"\n)',
              'import (\n\t"context"\n\t"errors"\n\t"testing"\n\t"time"\n\n\tcorev1 "hmans.de/chatto/internal/pb/chatto/core/v1"\n)',
              1,
          )
          test = r'''

func TestDMAssetAccessRequiresMembershipAndKeepsPendingUploaderAsset(t *testing.T) {
	chatto, _ := setupTestCore(t)
	ctx := testContext(t)

	alice, err := chatto.CreateUser(ctx, SystemActorID, "dm-asset-alice", "Alice", "password123")
	if err != nil {
		t.Fatalf("CreateUser(alice): %v", err)
	}
	bob, err := chatto.CreateUser(ctx, SystemActorID, "dm-asset-bob", "Bob", "password123")
	if err != nil {
		t.Fatalf("CreateUser(bob): %v", err)
	}
	carol, err := chatto.CreateUser(ctx, SystemActorID, "dm-asset-carol", "Carol", "password123")
	if err != nil {
		t.Fatalf("CreateUser(carol): %v", err)
	}
	room, _, err := chatto.FindOrCreateDM(ctx, alice.Id, []string{bob.Id})
	if err != nil {
		t.Fatalf("FindOrCreateDM: %v", err)
	}
	if _, err := chatto.PostMessage(ctx, KindDM, room.Id, bob.Id, "history", nil, "", "", nil, false); err != nil {
		t.Fatalf("PostMessage: %v", err)
	}
	if err := chatto.ForgetOneToOneDM(ctx, alice.Id, room.Id); err != nil {
		t.Fatalf("ForgetOneToOneDM: %v", err)
	}
	if err := chatto.RestoreOneToOneDMVisibility(ctx, alice.Id, room.Id); err != nil {
		t.Fatalf("RestoreOneToOneDMVisibility: %v", err)
	}

	pending := &corev1.Attachment{
		Id:          NewAssetID(),
		RoomId:      room.Id,
		Filename:    "pending.txt",
		ContentType: "text/plain",
		Size:        7,
	}
	if err := chatto.assetLifecycle().RecordUploadedPendingAttachmentAsset(
		ctx,
		alice.Id,
		room.Id,
		pending,
		"",
		time.Now().Add(time.Hour),
		false,
	); err != nil {
		t.Fatalf("RecordUploadedPendingAttachmentAsset: %v", err)
	}

	accessible, err := chatto.CanAccessDMAsset(ctx, alice.Id, room.Id, pending.Id)
	if err != nil {
		t.Fatalf("CanAccessDMAsset(uploader): %v", err)
	}
	if !accessible {
		t.Fatal("pending attachment is not accessible to its uploader")
	}
	accessible, err = chatto.CanAccessDMAsset(ctx, carol.Id, room.Id, pending.Id)
	if err != nil {
		t.Fatalf("CanAccessDMAsset(non-member): %v", err)
	}
	if accessible {
		t.Fatal("non-member can access a DM attachment")
	}
}
'''
          text += test
          path.write_text(text)
          PY
          gofmt -w cli/internal/core/dm_history.go cli/internal/core/dm_history_test.go
          git rm .github/workflows/dm-history-deletion-core-fix.yml
          git diff --check
      - name: Build embedded frontend
        run: mise build-frontend
      - name: Validate backend and race paths
        shell: bash
        run: |
          cd cli
          go test -trimpath -p 1 ./internal/core ./internal/connectapi ./internal/http_server
          go test -trimpath -race -count=1 ./internal/core -run 'Test(ForgetOneToOneDM|StartDMRestoresVisibility|RepeatedDMDeletion|DMAssetAccess)'
      - name: Commit and push with the verified source identity
        shell: bash
        run: |
          set -euo pipefail
          git add --all
          source_author_name="$(git show -s --format=%an HEAD)"
          source_author_email="$(git show -s --format=%ae HEAD)"
          source_committer_name="$(git show -s --format=%cn HEAD)"
          source_committer_email="$(git show -s --format=%ce HEAD)"
          test -n "${source_author_name}"
          test -n "${source_author_email}"
          test -n "${source_committer_name}"
          test -n "${source_committer_email}"
          export GIT_AUTHOR_NAME="${source_author_name}"
          export GIT_AUTHOR_EMAIL="${source_author_email}"
          export GIT_COMMITTER_NAME="${source_committer_name}"
          export GIT_COMMITTER_EMAIL="${source_committer_email}"
          git commit -m 'fix(dm): authorize pending assets safely'
          test "$(git show -s --format=%ae HEAD)" = "${source_author_email}"
          test "$(git show -s --format=%ce HEAD)" = "${source_committer_email}"
          if git show -s --format=%B HEAD | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            exit 1
          fi
          git push origin HEAD:feat/dm-history-deletion
