name: Validate responsive DM deletion UI

on:
  push:
    branches:
      - feat/dm-conversation-deletion

permissions:
  contents: write
  issues: write

concurrency:
  group: dm-history-deletion-ui-candidate
  cancel-in-progress: true

env:
  TARGET_BRANCH: feat/dm-history-deletion
  TARGET_SHA: 7314a71644d42416a43fb8ba34dd88133dc8ab5b
  PATCH_BLOB_SHA: bce6a292036471d932837b8bb37317cc87f2c91c
  PATCH_SHA256: 3eb4447138800ac9dfb2de82997f22d59911400164685af5bdd483e57ac93bd0

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the exact product head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: true

      - name: Verify the target branch has not moved
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${TARGET_SHA}"
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "${TARGET_SHA}"

      - name: Fetch and apply the reviewed UI patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/patch-blob.json"
          patch="${RUNNER_TEMP}/dm-history-ui.patch"
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${PATCH_BLOB_SHA}" \
            > "${response}"
          jq -r '.content' "${response}" | tr -d '\n' | base64 --decode > "${patch}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${patch}" | sha256sum --check --status
          git apply --check "${patch}"
          git apply "${patch}"
          git diff --check

      - name: Set up the pinned project toolchain
        uses: ./.github/actions/setup

      - name: Generate and format canonical frontend output
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir apps/frontend run paraglide
          pnpm --dir apps/frontend exec prettier --write \
            messages/de/direct_message.json \
            messages/en/direct_message.json \
            messages/es/direct_message.json \
            messages/fr/direct_message.json \
            messages/pt/direct_message.json \
            src/lib/i18n/messages.ts \
            src/lib/ui/Dialog.svelte \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            src/routes/chat/ModalContainerButtonMock.svelte \
            src/routes/chat/ModalContainerDialogMock.svelte \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte' \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'
          git diff --check
          node apps/frontend/scripts/check-i18n-catalogs.mjs

      - name: Verify generated output is deterministic
        shell: bash
        run: |
          set -euo pipefail
          git add --all
          first_tree="$(git write-tree)"
          pnpm --dir apps/frontend run paraglide
          git add --all
          second_tree="$(git write-tree)"
          test "${first_tree}" = "${second_tree}"
          git diff --cached --check

      - name: Install Chromium for browser-component tests
        run: pnpm --dir apps/frontend exec playwright install --with-deps chromium

      - name: Run targeted frontend tests
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter towk-frontend exec vitest --run \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'

      - name: Run frontend typecheck and lint
        shell: bash
        run: |
          set -euo pipefail
          pnpm run check:frontend
          pnpm run lint:frontend

      - name: Run the complete frontend unit suite
        run: pnpm run test:frontend

      - name: Build the frontend
        run: mise build-frontend

      - name: Run repository policy checks
        shell: bash
        run: |
          set -euo pipefail
          mise public-surface-check
          mise license-check
          git diff --cached --check
          if git diff --cached | grep -E '(/home/[^/[:space:]]+|/Users/[^/[:space:]]+|[A-Za-z]:\\Users\\|Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:)'; then
            echo 'Blocked private path or forbidden attribution trailer in candidate diff' >&2
            exit 1
          fi

      - name: Commit with the verified source identity
        shell: bash
        run: |
          set -euo pipefail
          git add --all
          export GIT_AUTHOR_NAME="$(git show -s --format=%an "${TARGET_SHA}")"
          export GIT_AUTHOR_EMAIL="$(git show -s --format=%ae "${TARGET_SHA}")"
          export GIT_COMMITTER_NAME="$(git show -s --format=%cn "${TARGET_SHA}")"
          export GIT_COMMITTER_EMAIL="$(git show -s --format=%ce "${TARGET_SHA}")"
          test -n "${GIT_AUTHOR_NAME}"
          test -n "${GIT_AUTHOR_EMAIL}"
          test -n "${GIT_COMMITTER_NAME}"
          test -n "${GIT_COMMITTER_EMAIL}"
          git commit -m 'fix(frontend): refine DM deletion confirmation'
          if git show -s --format=%B HEAD | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            exit 1
          fi

      - name: Publish the verified fast-forward
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "${TARGET_SHA}"
          git merge-base --is-ancestor "${TARGET_SHA}" HEAD
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

      - name: Report validation result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          current_sha="$(git rev-parse HEAD 2>/dev/null || printf '%s' "${TARGET_SHA}")"
          body="Responsive DM UI validation ${JOB_STATUS}. Run: ${GITHUB_RUN_ID}. Product ref: ${current_sha}."
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/186/comments" \
            -f body="${body}"
