name: DM history deletion candidate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: dm-history-deletion-candidate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TARGET_SHA: c7a6ac2517f9e4ae302cf67b9928925409768a95
  TARGET_BRANCH: feat/dm-history-deletion
  PATCH_BLOB_SHA: 4609a60c212db554fea2d8104f8620010ba6b3e5
  PATCH_GZIP_SHA256: 71aa19c8ab774148749095fa5df31271a35a6781faf259bfd4c944e8606ae19d
  PATCH_SHA256: 67e43eae5f11b35bde8d48e5bedc632e552a9a6cda7761a60be5462ab212581d

jobs:
  candidate:
    name: generate, verify, and publish candidate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out exact PR 187 head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: true

      - name: Verify exact source and target branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${TARGET_SHA}"
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "${TARGET_SHA}"

      - name: Fetch and apply reviewed source patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/patch-blob.json"
          patch_gz="${RUNNER_TEMP}/dm-history.patch.gz"
          patch="${RUNNER_TEMP}/dm-history.patch"
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${PATCH_BLOB_SHA}" \
            > "${response}"
          jq -r '.content' "${response}" | tr -d '\n' | base64 --decode > "${patch_gz}"
          printf '%s  %s\n' "${PATCH_GZIP_SHA256}" "${patch_gz}" | sha256sum --check --status
          gzip --decompress --stdout "${patch_gz}" > "${patch}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${patch}" | sha256sum --check --status
          git apply --check "${patch}"
          git apply "${patch}"
          git diff --check

      - name: Setup project toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Format and generate canonical outputs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git diff --name-only -- '*.go')
          if ((${#go_files[@]})); then
            gofmt -w "${go_files[@]}"
          fi
          mise codegen-proto
          pnpm --dir apps/frontend run paraglide
          git add --all
          first_tree="$(git write-tree)"
          mise codegen-proto
          pnpm --dir apps/frontend run paraglide
          git add --all
          second_tree="$(git write-tree)"
          test "${first_tree}" = "${second_tree}"
          git diff --cached --check
          test -z "$(gofmt -l $(git diff --cached --name-only -- '*.go'))"

      - name: Run targeted backend tests
        shell: bash
        run: |
          set -euo pipefail
          cd cli
          go test -trimpath -p 1 ./internal/core ./internal/connectapi ./internal/http_server
          go test -trimpath -race -count=1 ./internal/core \
            -run 'Test(ForgetOneToOneDMConcurrentIsIdempotent|DMHistoryBoundaryAppliesAcrossOperationModels|DMAssetAccessFollowsPrivateHistoryCutoff)$'

      - name: Run full CLI test task
        env:
          CHATTO_GO_TEST_P: "1"
        run: mise test-cli

      - name: Run frontend typecheck, lint, and unit tests
        shell: bash
        run: |
          set -euo pipefail
          pnpm run check:frontend
          pnpm run lint:frontend
          pnpm run test:frontend

      - name: Run repository policy checks
        shell: bash
        run: |
          set -euo pipefail
          mise public-surface-check
          mise license-check
          git diff --cached --check
          if git diff --cached | grep -E '(/home/[^/[:space:]]+|/Users/[^/[:space:]]+|[A-Za-z]:\\Users\\|Co-authored-by:|Generated-by:|Assisted-by:)'; then
            echo 'Blocked private path or forbidden attribution trailer in candidate diff' >&2
            exit 1
          fi

      - name: Commit verified candidate with Yoan identity
        shell: bash
        run: |
          set -euo pipefail
          export GIT_AUTHOR_NAME="$(git show -s --format=%an "${TARGET_SHA}")"
          export GIT_AUTHOR_EMAIL="$(git show -s --format=%ae "${TARGET_SHA}")"
          export GIT_COMMITTER_NAME="$(git show -s --format=%cn "${TARGET_SHA}")"
          export GIT_COMMITTER_EMAIL="$(git show -s --format=%ce "${TARGET_SHA}")"
          test "${GIT_AUTHOR_NAME}" = 'Yo-DDV'
          test "${GIT_COMMITTER_NAME}" = 'Yo-DDV'
          git commit -m 'fix(dm): complete private conversation deletion'
          test "$(git show -s --format=%an HEAD)" = 'Yo-DDV'
          test "$(git show -s --format=%cn HEAD)" = 'Yo-DDV'
          if git show -s --format=%B HEAD | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            echo 'Forbidden attribution trailer in candidate commit' >&2
            exit 1
          fi

      - name: Publish verified fast-forward to PR 187
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "${TARGET_SHA}"
          git merge-base --is-ancestor "${TARGET_SHA}" HEAD
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

      - name: Archive verified candidate source
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > "${RUNNER_TEMP}/towk-dm-history-candidate.sha"
          git archive --format=tar.gz --output="${RUNNER_TEMP}/towk-dm-history-candidate.tar.gz" HEAD
          sha256sum "${RUNNER_TEMP}/towk-dm-history-candidate.tar.gz" \
            > "${RUNNER_TEMP}/towk-dm-history-candidate.sha256"

      - name: Upload verified candidate source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-dm-history-candidate
          path: |
            ${{ runner.temp }}/towk-dm-history-candidate.tar.gz
            ${{ runner.temp }}/towk-dm-history-candidate.sha256
            ${{ runner.temp }}/towk-dm-history-candidate.sha
          retention-days: 7
          if-no-files-found: error
