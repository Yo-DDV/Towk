name: DM conversation deletion source snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: dm-conversation-deletion-source-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  archive-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Archive repository source
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.pnpm-store \
            --exclude='cli/bin' \
            --exclude='apps/frontend/build' \
            -czf "${RUNNER_TEMP}/towk-dm-conversation-deletion-source.tar.gz" .
          sha256sum "${RUNNER_TEMP}/towk-dm-conversation-deletion-source.tar.gz" \
            > "${RUNNER_TEMP}/towk-dm-conversation-deletion-source.sha256"

      - name: Upload source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-dm-conversation-deletion-source
          path: |
            ${{ runner.temp }}/towk-dm-conversation-deletion-source.tar.gz
            ${{ runner.temp }}/towk-dm-conversation-deletion-source.sha256
          retention-days: 1
          if-no-files-found: error
