name: DM history deletion source snapshot

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: dm-history-deletion-source-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TARGET_SHA: c7a6ac2517f9e4ae302cf67b9928925409768a95

jobs:
  archive-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR 187 head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Verify exact source ref
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${TARGET_SHA}"

      - name: Archive repository source
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${TARGET_SHA}" > "${RUNNER_TEMP}/towk-dm-history-deletion-source.sha"
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.pnpm-store \
            --exclude='cli/bin' \
            --exclude='apps/frontend/build' \
            -czf "${RUNNER_TEMP}/towk-dm-history-deletion-source.tar.gz" .
          sha256sum "${RUNNER_TEMP}/towk-dm-history-deletion-source.tar.gz" \
            > "${RUNNER_TEMP}/towk-dm-history-deletion-source.sha256"

      - name: Upload source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: towk-dm-history-deletion-source
          path: |
            ${{ runner.temp }}/towk-dm-history-deletion-source.tar.gz
            ${{ runner.temp }}/towk-dm-history-deletion-source.sha256
            ${{ runner.temp }}/towk-dm-history-deletion-source.sha
          retention-days: 1
          if-no-files-found: error
