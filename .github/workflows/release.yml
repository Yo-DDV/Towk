name: release Towk

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, attest, and publish release
    if: github.repository == 'Yo-DDV/towk'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.TAG }}

      - name: Validate immutable release input
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "${TAG}^{commit}" origin/main

      - name: Set up project toolchain
        uses: ./.github/actions/setup

      - name: Build embedded client and synchronize legal files
        run: |
          mise build-frontend
          mise sync-cli-legal

      - name: Ensure a draft GitHub release exists
        shell: bash
        run: gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --draft --verify-tag --title "$TAG"

      - name: Build and attach release archives
        run: goreleaser release --clean

      - name: Attest release archives
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Publish the verified release
        run: gh release edit "$TAG" --draft=false
