name: contribution policy

on: # zizmor: ignore[dangerous-triggers] metadata-only; no checkout, untrusted execution, or secrets
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: contribution-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  external-intake:
    name: External pull request intake
    if: >-
      github.event.pull_request.user.login != 'Yo-DDV' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Redirect public participation to Issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.issue.number;
            const issueChooser = `https://github.com/${owner}/${repo}/issues/new/choose`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                'Towk accepts public participation through GitHub Issues only.',
                '',
                `Please use the [issue chooser](${issueChooser}) to submit a bug, feature proposal, or question.`,
                'Do not disclose suspected vulnerabilities publicly; use the private reporting route in the Security tab.',
                '',
                'This pull request is closed automatically and will not be reviewed or merged.'
              ].join('\n')
            });
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: issueNumber,
              state: 'closed'
            });
            await github.rest.issues.lock({
              owner,
              repo,
              issue_number: issueNumber,
              lock_reason: 'off-topic'
            });

  metadata:
    name: Pull request metadata
    if: >-
      github.event.pull_request.user.login == 'Yo-DDV' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate title, branch, body, and attestations
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const failures = [];
            const title = pr.title.trim();
            const body = pr.body || '';
            const branch = pr.head.ref;
            const isAutomation = ['dependabot[bot]', 'github-actions[bot]'].includes(pr.user?.login);
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            if (!/^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!?: .+/.test(title)) {
              failures.push('Use a Conventional Commit pull request title.');
            }

            if (!isAutomation) {
              for (const heading of ['## Summary', '## Risk and compatibility', '## Verification', '## Checklist']) {
                if (!body.includes(heading)) failures.push(`Missing required section: ${heading}`);
              }

              if (/- \[ \]/.test(body)) {
                failures.push('Complete every pull request checklist item before review.');
              }

              const publicText = [
                ['pull request title', title],
                ['pull request body', body],
                ...commits.map((commit) => [`commit ${commit.sha.slice(0, 12)}`, commit.commit.message]),
              ];
              const privatePath = /(?:^|[\s`'"(])(?:\/home\/[^/\s]+\/|\/Users\/[^/\s]+\/|[A-Za-z]:\\Users\\[^\\\s]+\\)/i;
              for (const [label, text] of publicText) {
                if (privatePath.test(text)) failures.push(`${label} contains a private workstation path.`);
              }
            }

            if (failures.length) core.setFailed(failures.join('\n'));
