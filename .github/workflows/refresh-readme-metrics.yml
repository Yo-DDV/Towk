name: Refresh README metrics

on:
  push:
    branches:
      - main
  schedule:
    # GitHub cron is UTC. These four candidates cover 06:17 and 21:17
    # Europe/Paris in both standard time and daylight-saving time; the first
    # step keeps only the two matching local-time runs.
    - cron: "17 4,5,19,20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: readme-metrics
  cancel-in-progress: true

jobs:
  refresh:
    if: github.repository == 'Yo-DDV/Towk'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Select the Europe/Paris refresh window
        id: window
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=Europe/Paris date +%H)"
          if [[ "$local_hour" == "06" || "$local_hour" == "21" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out the source branch
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1

      - name: Set up the pinned Node.js toolchain
        if: steps.window.outputs.run == 'true'
        uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
          install-frontend-deps: "false"
          mise-install-args: node

      - name: Test the metrics generators
        if: steps.window.outputs.run == 'true'
        run: |
          node --test tools/generate-readme-metrics.test.mjs
          node --test tools/generate-readme-project-pulse.test.mjs

      - name: Generate localized repository visuals
        if: steps.window.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOWK_METRICS_OUTPUT_DIR: ${{ runner.temp }}/towk-readme-metrics
          TOWK_METRICS_SOURCE_BRANCH: main
          TOWK_METRICS_BASELINE_SHA: 205e91fe1ae5e5c23420974f7e04cf82456eeab3
        run: node tools/generate-readme-project-pulse.mjs

      - name: Validate the generated bundle
        if: steps.window.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/towk-readme-metrics"
          test -s "$output/metrics.json"
          test -s "$output/README.md"
          for locale in en fr de es pt; do
            for asset in hero hero-mobile activity activity-mobile contributors contributors-mobile; do
              test -s "$output/$locale/$asset.svg"
            done
          done
          expected=32
          actual="$(find "$output" -type f | wc -l | tr -d ' ')"
          test "$actual" -eq "$expected"

      - name: Publish the generated branch
        if: steps.window.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          source_dir="${RUNNER_TEMP}/towk-readme-metrics"
          publish_dir="${RUNNER_TEMP}/towk-readme-metrics-branch"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          if git fetch --no-tags origin \
            readme-metrics:refs/remotes/origin/readme-metrics; then
            git worktree add --detach "$publish_dir" \
              refs/remotes/origin/readme-metrics
            git -C "$publish_dir" switch -C readme-metrics
          else
            git worktree add --detach "$publish_dir" HEAD
            git -C "$publish_dir" switch --orphan readme-metrics
            git -C "$publish_dir" rm -rf --ignore-unmatch .
          fi

          find "$publish_dir" -mindepth 1 -maxdepth 1 \
            ! -name .git -exec rm -rf {} +
          cp -a "$source_dir/." "$publish_dir/"

          git -C "$publish_dir" add -A
          if git -C "$publish_dir" diff --cached --quiet; then
            exit 0
          fi

          git -C "$publish_dir" commit -m \
            "chore(metrics): refresh README visuals"
          git -C "$publish_dir" push origin HEAD:readme-metrics

      - name: Publish the README methodology update branch
        if: steps.window.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node tools/update-readme-project-pulse-copy.mjs

          git add README.md README.de.md README.es.md README.fr.md README.pt.md
          if git diff --cached --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C automation/readme-independent-pulse-copy
          git commit -m "docs: explain independent Towk metrics"
          git push --force-with-lease origin \
            HEAD:automation/readme-independent-pulse-copy
