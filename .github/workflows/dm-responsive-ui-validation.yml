name: Diagnose responsive DM deletion UI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: dm-responsive-ui-diagnostics
  cancel-in-progress: true

env:
  PREVIOUS_PRODUCT_SHA: 7314a71644d42416a43fb8ba34dd88133dc8ab5b
  PATCH_BLOB_SHA: e596667c19464416e0f941086704e6675aa5959c
  PATCH_GZIP_SHA256: 947cee04a155d75fd66ec1c2ed06bd13d642ee6c3c120b79762df2eecaf67e92
  PATCH_SHA256: 889f9a3d5a8438365d2b2539d2c246a5c82795e55a21b008f96e87a0d07e16f5

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify and apply reviewed patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "${PREVIOUS_PRODUCT_SHA}" HEAD
          unexpected="$(git diff --name-only "${PREVIOUS_PRODUCT_SHA}...HEAD" -- . ':(exclude).github/workflows/dm-responsive-ui-validation.yml')"
          test -z "${unexpected}"
          response="${RUNNER_TEMP}/patch-blob.json"
          patch_gz="${RUNNER_TEMP}/dm-responsive-ui.patch.gz"
          patch="${RUNNER_TEMP}/dm-responsive-ui.patch"
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${PATCH_BLOB_SHA}" \
            > "${response}"
          jq -r '.content' "${response}" | tr -d '\n' | base64 --decode > "${patch_gz}"
          printf '%s  %s\n' "${PATCH_GZIP_SHA256}" "${patch_gz}" | sha256sum --check --status
          gzip --decompress --stdout "${patch_gz}" > "${patch}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${patch}" | sha256sum --check --status
          git apply --check "${patch}"
          git apply "${patch}"
          git rm .github/workflows/dm-responsive-ui-validation.yml
          git diff --check

      - name: Set up pinned project toolchain
        uses: ./.github/actions/setup

      - name: Generate and format candidate
        shell: bash
        run: |
          set -euo pipefail
          mise codegen-proto
          pnpm --dir apps/frontend exec prettier --write \
            src/lib/ui/Dialog.svelte \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            src/routes/chat/ModalContainerButtonMock.svelte \
            src/routes/chat/ModalContainerDialogMock.svelte \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte' \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'
          pnpm --dir apps/frontend run paraglide
          node apps/frontend/scripts/check-i18n-catalogs.mjs
          git diff --check
          git add --all
          export GIT_AUTHOR_NAME="$(git show -s --format=%an "${PREVIOUS_PRODUCT_SHA}")"
          export GIT_AUTHOR_EMAIL="$(git show -s --format=%ae "${PREVIOUS_PRODUCT_SHA}")"
          export GIT_COMMITTER_NAME="$(git show -s --format=%cn "${PREVIOUS_PRODUCT_SHA}")"
          export GIT_COMMITTER_EMAIL="$(git show -s --format=%ce "${PREVIOUS_PRODUCT_SHA}")"
          git commit -m 'fix(frontend): refine DM deletion confirmation'
          git archive --format=tar.gz --output="${RUNNER_TEMP}/dm-responsive-ui-candidate.tar.gz" HEAD
          git rev-parse HEAD > "${RUNNER_TEMP}/dm-responsive-ui-candidate.sha"

      - name: Install Chromium
        run: pnpm --dir apps/frontend exec playwright install --with-deps chromium

      - name: Run targeted tests and capture output
        shell: bash
        run: |
          set +e
          : > "${RUNNER_TEMP}/targeted-tests.log"
          rc=0
          for test_file in \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'
          do
            printf '\n===== %s =====\n' "${test_file}" | tee -a "${RUNNER_TEMP}/targeted-tests.log"
            pnpm --filter towk-frontend exec vitest --run "${test_file}" 2>&1 | tee -a "${RUNNER_TEMP}/targeted-tests.log"
            test_rc=${PIPESTATUS[0]}
            if [ "${test_rc}" -ne 0 ]; then rc=${test_rc}; fi
          done
          printf '%s\n' "${rc}" > "${RUNNER_TEMP}/targeted-tests.rc"
          exit 0

      - name: Upload candidate and diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dm-responsive-ui-diagnostics
          path: |
            ${{ runner.temp }}/dm-responsive-ui-candidate.tar.gz
            ${{ runner.temp }}/dm-responsive-ui-candidate.sha
            ${{ runner.temp }}/targeted-tests.log
            ${{ runner.temp }}/targeted-tests.rc
          retention-days: 1
          if-no-files-found: error

      - name: Enforce targeted test result
        shell: bash
        run: test "$(cat "${RUNNER_TEMP}/targeted-tests.rc")" = '0'
