name: Validate responsive DM deletion UI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: dm-responsive-ui-validation
  cancel-in-progress: true

env:
  PREVIOUS_PRODUCT_SHA: 7314a71644d42416a43fb8ba34dd88133dc8ab5b
  TARGET_BRANCH: feat/dm-history-deletion
  PATCH_BLOB_SHA: f3de73b871bb3131f70430ad6aa45960866388f4
  PATCH_GZIP_SHA256: c70785173c2d95d91bbd8025e095b479af1c517708be2809a2e55ee3b3157164
  PATCH_SHA256: 5ed90660b433f4d319ca925e2d7864a26ba9cdb3804a23ce2935390bed968924

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Verify exact branch state
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "${PREVIOUS_PRODUCT_SHA}" HEAD
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "$(git rev-parse HEAD)"
          unexpected="$(git diff --name-only "${PREVIOUS_PRODUCT_SHA}...HEAD" -- . ':(exclude).github/workflows/dm-responsive-ui-validation.yml')"
          test -z "${unexpected}" || { printf '%s\n' "${unexpected}"; exit 1; }

      - name: Fetch and apply reviewed UI patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/patch-blob.json"
          patch_gz="${RUNNER_TEMP}/dm-responsive-ui.patch.gz"
          patch="${RUNNER_TEMP}/dm-responsive-ui.patch"
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${PATCH_BLOB_SHA}" \
            > "${response}"
          jq -r '.content' "${response}" | tr -d '\n' | base64 --decode > "${patch_gz}"
          printf '%s  %s\n' "${PATCH_GZIP_SHA256}" "${patch_gz}" | sha256sum --check --status
          gzip --decompress --stdout "${patch_gz}" > "${patch}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${patch}" | sha256sum --check --status
          git apply --check "${patch}"
          git apply "${patch}"
          git rm .github/workflows/dm-responsive-ui-validation.yml
          git diff --check

      - name: Set up pinned project toolchain
        uses: ./.github/actions/setup

      - name: Generate and format canonical output
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir apps/frontend exec prettier --write \
            messages/de/direct_message.json \
            messages/en/direct_message.json \
            messages/es/direct_message.json \
            messages/fr/direct_message.json \
            messages/pt/direct_message.json \
            src/lib/ui/Dialog.svelte \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            src/routes/chat/ModalContainerButtonMock.svelte \
            src/routes/chat/ModalContainerDialogMock.svelte \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte' \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'
          mise codegen-proto
          pnpm --dir apps/frontend run paraglide
          node apps/frontend/scripts/check-i18n-catalogs.mjs
          git diff --check

      - name: Verify candidate paths and commit
        shell: bash
        run: |
          set -euo pipefail
          git add --all
          git diff --cached --check
          allowed="${RUNNER_TEMP}/allowed-staged-paths.txt"
          changed="${RUNNER_TEMP}/changed-staged-paths.txt"
          cat > "${allowed}" <<'PATHS'
          .github/workflows/dm-responsive-ui-validation.yml
          apps/frontend/messages/de/direct_message.json
          apps/frontend/messages/en/direct_message.json
          apps/frontend/messages/es/direct_message.json
          apps/frontend/messages/fr/direct_message.json
          apps/frontend/messages/pt/direct_message.json
          apps/frontend/src/lib/i18n/messages.ts
          apps/frontend/src/lib/ui/Dialog.svelte
          apps/frontend/src/lib/ui/Dialog.svelte.spec.ts
          apps/frontend/src/routes/chat/ModalContainer.svelte
          apps/frontend/src/routes/chat/ModalContainer.svelte.spec.ts
          apps/frontend/src/routes/chat/ModalContainerButtonMock.svelte
          apps/frontend/src/routes/chat/ModalContainerDialogMock.svelte
          apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte
          apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts
          PATHS
          git diff --cached --name-only | sort > "${changed}"
          sort -o "${allowed}" "${allowed}"
          unexpected="$(comm -23 "${changed}" "${allowed}")"
          test -z "${unexpected}" || { printf '%s\n' "${unexpected}"; exit 1; }

          expected_author_name="$(git show -s --format=%an "${PREVIOUS_PRODUCT_SHA}")"
          expected_author_email="$(git show -s --format=%ae "${PREVIOUS_PRODUCT_SHA}")"
          expected_committer_name="$(git show -s --format=%cn "${PREVIOUS_PRODUCT_SHA}")"
          expected_committer_email="$(git show -s --format=%ce "${PREVIOUS_PRODUCT_SHA}")"
          test -n "${expected_author_name}"
          test -n "${expected_author_email}"
          test -n "${expected_committer_name}"
          test -n "${expected_committer_email}"
          export GIT_AUTHOR_NAME="${expected_author_name}"
          export GIT_AUTHOR_EMAIL="${expected_author_email}"
          export GIT_COMMITTER_NAME="${expected_committer_name}"
          export GIT_COMMITTER_EMAIL="${expected_committer_email}"
          git commit -m 'fix(frontend): refine DM deletion confirmation'
          test "$(git show -s --format=%an HEAD)" = "${expected_author_name}"
          test "$(git show -s --format=%cn HEAD)" = "${expected_committer_name}"
          if git show -s --format=%B HEAD | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            exit 1
          fi

      - name: Verify generated output is deterministic
        shell: bash
        run: |
          set -euo pipefail
          mise codegen-proto
          pnpm --dir apps/frontend run paraglide
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Build API types for browser tests
        run: pnpm run build:api-types

      - name: Install Chromium
        run: pnpm --dir apps/frontend exec playwright install --with-deps chromium

      - name: Run targeted component tests
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter towk-frontend exec vitest --run \
            src/lib/ui/Dialog.svelte.spec.ts \
            src/routes/chat/ModalContainer.svelte.spec.ts \
            'src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'

      - name: Run frontend typecheck
        run: pnpm run check:frontend

      - name: Run frontend lint
        run: pnpm run lint:frontend

      - name: Run complete frontend unit suite
        run: pnpm run test:frontend

      - name: Build frontend
        run: mise build-frontend

      - name: Run repository policy and authorship checks
        shell: bash
        run: |
          set -euo pipefail
          mise public-surface-check
          mise license-check
          git diff --check "${PREVIOUS_PRODUCT_SHA}...HEAD"
          test -z "$(git status --porcelain)"

          allowed="${RUNNER_TEMP}/allowed-final-paths.txt"
          changed="${RUNNER_TEMP}/changed-final-paths.txt"
          cat > "${allowed}" <<'PATHS'
          apps/frontend/messages/de/direct_message.json
          apps/frontend/messages/en/direct_message.json
          apps/frontend/messages/es/direct_message.json
          apps/frontend/messages/fr/direct_message.json
          apps/frontend/messages/pt/direct_message.json
          apps/frontend/src/lib/i18n/messages.ts
          apps/frontend/src/lib/ui/Dialog.svelte
          apps/frontend/src/lib/ui/Dialog.svelte.spec.ts
          apps/frontend/src/routes/chat/ModalContainer.svelte
          apps/frontend/src/routes/chat/ModalContainer.svelte.spec.ts
          apps/frontend/src/routes/chat/ModalContainerButtonMock.svelte
          apps/frontend/src/routes/chat/ModalContainerDialogMock.svelte
          apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte
          apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts
          PATHS
          git diff --name-only "${PREVIOUS_PRODUCT_SHA}...HEAD" | sort > "${changed}"
          sort -o "${allowed}" "${allowed}"
          unexpected="$(comm -23 "${changed}" "${allowed}")"
          test -z "${unexpected}" || { printf '%s\n' "${unexpected}"; exit 1; }

          if git diff "${PREVIOUS_PRODUCT_SHA}...HEAD" | grep -E '(/home/[^/[:space:]]+|/Users/[^/[:space:]]+|[A-Za-z]:\\Users\\|Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:)'; then
            echo 'Blocked private path or forbidden attribution trailer in candidate diff' >&2
            exit 1
          fi
          expected_author_name="$(git show -s --format=%an "${PREVIOUS_PRODUCT_SHA}")"
          expected_committer_name="$(git show -s --format=%cn "${PREVIOUS_PRODUCT_SHA}")"
          test "$(git show -s --format=%an HEAD)" = "${expected_author_name}"
          test "$(git show -s --format=%cn HEAD)" = "${expected_committer_name}"
          if git log --format=%B "${PREVIOUS_PRODUCT_SHA}..HEAD" | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            exit 1
          fi

      - name: Publish verified fast-forward
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
          test "$(git rev-parse "refs/remotes/origin/${TARGET_BRANCH}")" = "$(git rev-parse HEAD^)"
          git merge-base --is-ancestor "${PREVIOUS_PRODUCT_SHA}" HEAD
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"
