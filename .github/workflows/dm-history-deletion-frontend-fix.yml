name: DM history deletion frontend fix

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: dm-history-deletion-frontend-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feat/dm-history-deletion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/dm-history-deletion
          fetch-depth: 0
          persist-credentials: true
      - uses: ./.github/actions/setup
        with:
          install-cli-deps: "false"
          mise-install-args: "node"
      - name: Keep the toggle stateless and cover DM deletion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          toggle = Path('apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte')
          text = toggle.read_text()
          text = text.replace(
              "- `mode` - Responsive visibility for the toggle group.\n",
              "- `mode` - Responsive visibility for the toggle group.\n"
              "- `canDeleteDirectMessage` - Shows the private DM deletion action.\n"
              "- `onDeleteDirectMessage` - Opens the caller-owned confirmation flow.\n",
              1,
          )
          text = text.replace("  import { pushState } from '$app/navigation';\n  import { page } from '$app/state';\n", "", 1)
          text = text.replace(
              "  import { RoomType } from '$lib/render/types';\n"
              "  import { getActiveServer } from '$lib/state/activeServer.svelte';\n"
              "  import { serverRegistry } from '$lib/state/server/registry.svelte';\n",
              "",
              1,
          )
          text = text.replace(
              "    mode = 'desktop',\n    hasActiveCall = false\n",
              "    mode = 'desktop',\n"
              "    hasActiveCall = false,\n"
              "    canDeleteDirectMessage = false,\n"
              "    onDeleteDirectMessage\n",
              1,
          )
          text = text.replace(
              "    mode?: 'desktop' | 'mobile' | 'always';\n    hasActiveCall?: boolean;\n",
              "    mode?: 'desktop' | 'mobile' | 'always';\n"
              "    hasActiveCall?: boolean;\n"
              "    canDeleteDirectMessage?: boolean;\n"
              "    onDeleteDirectMessage?: () => void;\n",
              1,
          )
          start = text.index("\n  const activeServerId = $derived(getActiveServer());")
          end = text.index("\n</script>", start)
          text = text[:start] + text[end:]
          text = text.replace("  {#if canDeleteDirectMessage}\n", "  {#if canDeleteDirectMessage && onDeleteDirectMessage}\n", 1)
          text = text.replace("      onclick={openDeleteDirectMessageConfirmation}\n", "      onclick={onDeleteDirectMessage}\n", 1)
          toggle.write_text(text)

          room = Path('apps/frontend/src/routes/chat/[serverId]/[roomId]/Room.svelte')
          text = room.read_text()
          marker = (
              "  // Channel rooms can be left unless membership is granted by Universal policy.\n"
              "  let showLeaveRoom = $derived(!!room.roomData && !room.isDM && !room.roomData.room.isUniversal);\n"
          )
          replacement = marker + (
              "  let canDeleteDirectMessage = $derived(\n"
              "    !!room.roomData && room.isDM && room.dmData?.participants.length === 2\n"
              "  );\n\n"
              "  function openDeleteDirectMessageConfirmation(): void {\n"
              "    if (!canDeleteDirectMessage) return;\n"
              "    pushState('', {\n"
              "      modal: {\n"
              "        type: 'deleteDirectMessage',\n"
              "        roomId,\n"
              "        roomName: title\n"
              "      }\n"
              "    });\n"
              "  }\n"
          )
          if marker not in text:
              raise SystemExit('room action marker not found')
          text = text.replace(marker, replacement, 1)
          for mode in ('mobile', 'desktop'):
              marker = f'              mode="{mode}"\n              activePanel='
              replacement = (
                  f'              mode="{mode}"\n'
                  '              canDeleteDirectMessage={canDeleteDirectMessage}\n'
                  '              onDeleteDirectMessage={openDeleteDirectMessageConfirmation}\n'
                  '              activePanel='
              )
              if marker not in text:
                  raise SystemExit(f'{mode} toggle marker not found')
              text = text.replace(marker, replacement, 1)
          room.write_text(text)

          spec = Path('apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts')
          text = spec.read_text()
          tests = '''\n\n  it('offers private DM deletion only when enabled', async () => {\n    const onDeleteDirectMessage = vi.fn();\n    const { container } = render(RoomSidebarToggle, {\n      props: {\n        activePanel: null,\n        onToggle: vi.fn(),\n        canDeleteDirectMessage: true,\n        onDeleteDirectMessage\n      }\n    });\n\n    const button = container.querySelector(\n      '[aria-label="Delete conversation"]'\n    ) as HTMLButtonElement | null;\n    expect(button).toBeTruthy();\n\n    button!.click();\n    await tick();\n\n    expect(onDeleteDirectMessage).toHaveBeenCalledOnce();\n  });\n\n  it('hides private DM deletion by default', async () => {\n    const { container } = render(RoomSidebarToggle, {\n      props: {\n        activePanel: null,\n        onToggle: vi.fn()\n      }\n    });\n\n    expect(container.querySelector('[data-testid="delete-direct-message-button"]')).toBeFalsy();\n  });\n'''
          closing = text.rfind('\n});')
          if closing < 0:
              raise SystemExit('toggle spec closing marker not found')
          text = text[:closing] + tests + text[closing:]
          spec.write_text(text)
          PY
          pnpm exec prettier --write \
            'apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte' \
            'apps/frontend/src/routes/chat/[serverId]/[roomId]/Room.svelte' \
            'apps/frontend/src/routes/chat/[serverId]/[roomId]/RoomSidebarToggle.svelte.spec.ts'
          git rm .github/workflows/dm-history-deletion-frontend-fix.yml
          git diff --check
      - name: Validate frontend changes
        run: |
          pnpm run check:frontend
          pnpm run lint:frontend
      - name: Commit and push with the verified source identity
        shell: bash
        run: |
          set -euo pipefail
          git add --all
          source_author_name="$(git show -s --format=%an HEAD)"
          source_author_email="$(git show -s --format=%ae HEAD)"
          source_committer_name="$(git show -s --format=%cn HEAD)"
          source_committer_email="$(git show -s --format=%ce HEAD)"
          test -n "${source_author_name}"
          test -n "${source_author_email}"
          test -n "${source_committer_name}"
          test -n "${source_committer_email}"
          export GIT_AUTHOR_NAME="${source_author_name}"
          export GIT_AUTHOR_EMAIL="${source_author_email}"
          export GIT_COMMITTER_NAME="${source_committer_name}"
          export GIT_COMMITTER_EMAIL="${source_committer_email}"
          git commit -m 'fix(dm): keep deletion action room-scoped'
          test "$(git show -s --format=%ae HEAD)" = "${source_author_email}"
          test "$(git show -s --format=%ce HEAD)" = "${source_committer_email}"
          if git show -s --format=%B HEAD | grep -E 'Co-authored-by:|Generated-by:|Assisted-by:|Pair-programmed-by:'; then
            exit 1
          fi
          git push origin HEAD:feat/dm-history-deletion
