name: Bug report
description: Report a reproducible problem in Towk.
title: "fix: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Search existing reports first. Remove secrets, personal data, private messages,
        production logs, and unredacted screenshots. Report vulnerabilities privately
        through the Security tab instead of this form.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, and what user or operator impact did it have?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend / PWA
        - Backend / API
        - Authentication / authorization
        - Realtime / notifications / calls
        - Deployment / configuration
        - Backup / restore / migration
        - Documentation / contribution workflow
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Towk version
      description: Provide the release, image digest, or full commit SHA.
      placeholder: v0.x.y, sha256:..., or 40-character commit SHA
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Redacted environment
      placeholder: |
        Deployment method:
        OS and architecture:
        Browser/device/PWA mode:
        Reverse proxy, NATS, S3, LiveKit, or identity provider when relevant:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Give exact steps using synthetic data.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and safe evidence
      description: Include only the smallest redacted log or screenshot needed.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Required checks
      options:
        - label: I searched existing issues and reproduced this on the stated Towk version.
          required: true
        - label: I removed secrets, personal data, private content, and identifying logs or screenshots.
          required: true
        - label: I read the contribution policy and am accountable for this report, including any agent-assisted content.
          required: true
