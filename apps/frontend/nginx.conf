server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index 200.html;

    set $towk_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; media-src 'self' blob: http: https:; connect-src 'self' http: https: ws: wss:; frame-src https://www.youtube-nocookie.com; worker-src 'self'";

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $towk_csp always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Serve precompressed brotli and gzip files generated by adapter-static
    brotli_static on;
    gzip_static on;

    # Immutable hashed assets — cache forever
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $towk_csp always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        try_files $uri =404;
    }

    # Service worker — validate cheaply, but don't force a full refetch churn
    location = /service-worker.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $towk_csp always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        try_files $uri =404;
    }

    # All other static files — no cache
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $towk_csp always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        try_files $uri /200.html;
    }
}
