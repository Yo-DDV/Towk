syntax = "proto3";

package chatto.core.v1;

import "chatto/core/v1/models.proto";
import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/core/v1;corev1";

// ============================================================================
// PERSISTED EVENT MESSAGE DEFINITIONS
// Changing field numbers or structure below affects JetStream-stored data.
//
// Top-level Event oneof tags owned by this file:
//   - 300-304: room lifecycle on evt.room.{roomId}.*
//   - 310-311: room membership on evt.room.{roomId}.*
//   - 320: server-wide account deletion fan-out
//   - 330-334: voice call lifecycle and participant lifecycle on evt.room.{roomId}.*
//
// Keep these tags coordinated with event.proto. Message-internal field numbers
// are local to each message and do not consume top-level Event tag space.
// ============================================================================

// ============================================================================
// ROOM LIFECYCLE EVENTS
// ============================================================================

message RoomCreatedEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
  string name = 3;
  string description = 4;
  // Room kind (channel or DM). Added when this event became durable
  // on the EVT stream — the room-catalog projection needs it to
  // distinguish DMs (which don't appear in group structures) from
  // channels.
  RoomKind kind = 5;
  // Whether this channel room grants effective membership to every
  // join-eligible server member. DM rooms must leave this false.
  bool universal = 6;
}

message RoomUpdatedEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
  string name = 3;
  string description = 4;
}

message RoomDeletedEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
}

// RoomArchivedEvent is published when a room is archived.
// Archived rooms are hidden from sidebars and Browse Rooms.
message RoomArchivedEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
}

// RoomUnarchivedEvent is published when a room is unarchived.
// The room becomes visible again in sidebars and Browse Rooms.
message RoomUnarchivedEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
}

// RoomUniversalChangedEvent is published when a channel room's universal
// membership flag changes. It is a single state-carrying configuration event
// rather than enabled/disabled lifecycle events so replay can apply the latest
// boolean value directly.
message RoomUniversalChangedEvent {
  string room_id = 1;
  bool universal = 2;
}

// ============================================================================
// ROOM MEMBERSHIP EVENTS
// ============================================================================

message UserJoinedRoomEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
}

message UserLeftRoomEvent {
  reserved 1;
  reserved "space_id";
  string room_id = 2;
}

// ServerMemberDeletedEvent is published when a user's account is deleted.
// This notifies all server members that the user is gone, so they can:
// - Update their member lists
// - Refresh messages to show "Deleted User" and unavailable content
message ServerMemberDeletedEvent {
  reserved 1;
  reserved "space_id";
  string user_id = 2;
}

// ============================================================================
// VOICE CALL EVENTS
// ============================================================================

enum CallParticipantEventSource {
  CALL_PARTICIPANT_EVENT_SOURCE_UNSPECIFIED = 0;
  // The user explicitly requested the transition through Towk.
  CALL_PARTICIPANT_EVENT_SOURCE_USER = 1;
  // LiveKit reported the transition through a webhook.
  CALL_PARTICIPANT_EVENT_SOURCE_LIVEKIT = 2;
  // Towk reconciled its local projection against LiveKit's current room state.
  CALL_PARTICIPANT_EVENT_SOURCE_RECONCILIATION = 3;
}

// Media-server connection state for one admitted call participant.
enum CallParticipantConnectionState {
  CALL_PARTICIPANT_CONNECTION_STATE_UNSPECIFIED = 0;
  // LiveKit currently observes this participant connection.
  CALL_PARTICIPANT_CONNECTION_STATE_CONNECTED = 1;
  // The connection disappeared without explicit user intent and is inside the
  // server-owned recovery grace period.
  CALL_PARTICIPANT_CONNECTION_STATE_INTERRUPTED = 2;
}

// Event: a user joined or attempted to join a voice call in a room.
//
// The participant is identified by the parent Event.actor_id. USER-sourced
// facts represent explicit user intent and may be optimistic; LIVEKIT and
// RECONCILIATION facts represent observed media-server state.
message CallParticipantJoinedEvent {
  string room_id = 1;
  CallParticipantEventSource source = 2;
  string call_id = 3;
  // Exact media-session connection. Empty identifies a legacy user-scoped fact.
  string participant_id = 4;
  // Stable display slot for concurrent connections from the same account.
  uint32 device_index = 5;
}

// Event: a user left or attempted to leave a voice call in a room.
//
// The participant is identified by the parent Event.actor_id. USER-sourced
// facts represent explicit user intent; LIVEKIT and RECONCILIATION facts
// represent observed media-server state.
message CallParticipantLeftEvent {
  string room_id = 1;
  CallParticipantEventSource source = 2;
  string call_id = 3;
  // Exact media-session connection. Empty removes every connection for actor_id.
  string participant_id = 4;
  // Stable display slot for concurrent connections from the same account.
  uint32 device_index = 5;
}

// Event: LiveKit or the authoritative reconciler observed a connection-state
// transition for an admitted participant. This does not change durable call
// membership; only an explicit leave or a post-grace reconciliation may do so.
message CallParticipantConnectionChangedEvent {
  string room_id = 1;
  CallParticipantEventSource source = 2;
  string call_id = 3;
  string participant_id = 4;
  uint32 device_index = 5;
  CallParticipantConnectionState state = 6;
  // Stable LiveKit webhook ID when the observation came from a webhook.
  string observation_id = 7;
  // Source timestamp used to reject delayed or reordered observations.
  google.protobuf.Timestamp observed_at = 8;
  // Present only while interrupted. Membership cannot be finalized before it.
  google.protobuf.Timestamp interruption_deadline = 9;
}

// Event: a voice call session started in a room.
//
// The e2ee_key_ref points to a per-call LiveKit E2EE key stored behind the KMS
// boundary. The raw key is deliberately not stored in EVT.
message CallStartedEvent {
  string room_id = 1;
  string call_id = 2;
  string e2ee_key_ref = 3;
  CallParticipantEventSource source = 4;
}

// Event: a voice call session ended in a room.
//
// The associated KMS call key is shredded when this fact is committed.
message CallEndedEvent {
  string room_id = 1;
  string call_id = 2;
  CallParticipantEventSource source = 3;
}
