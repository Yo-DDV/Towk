syntax = "proto3";

package chatto.config.v1;

option go_package = "hmans.de/chatto/internal/pb/chatto/config/v1;configv1";

// ServerConfig stores runtime-editable server settings.
// Stored in INSTANCE_CONFIG KV bucket with key "config.instance" (legacy
// names retained per ADR-029 to avoid a JetStream migration in this PR).
message ServerConfig {
  // Welcome message shown on the login page (markdown supported).
  string welcome_message = 1;

  // Server name, displayed in page titles.
  string server_name = 2;

  // Message of the Day, displayed in the header bar.
  string motd = 3;

  // Blocked usernames (newline-separated). Users cannot register with these names.
  // Checked case-insensitively during registration.
  string blocked_usernames = 4;

  reserved 5, 6;
  reserved "og_title", "og_description";

  // Server description, used for OG link-preview metadata and the welcome card.
  string description = 7;

  // Owner-requested runtime performance policy. Absence preserves the
  // historical runtime limits for upgraded installations.
  ServerPerformancePolicy performance_policy = 8;

  // Whether reciprocal public read receipts are enabled. Absence means enabled
  // for mixed-version compatibility and existing installations.
  optional bool read_receipts_enabled = 9;
}

// Bounded worker policy stored as a durable server configuration fact.
message PerformanceLimits {
  int32 image_transform_workers = 1;
  int32 image_transform_admissions = 2;
  int32 asset_upload_workers = 3;
  int32 link_preview_workers = 4;
  int32 video_workers = 5;
}

// Versioned owner-requested performance policy.
message ServerPerformancePolicy {
  uint32 schema_version = 1;
  string profile = 2;
  PerformanceLimits custom_limits = 3;
  uint64 revision = 4;
}
