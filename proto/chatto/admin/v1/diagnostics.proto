syntax = "proto3";

package chatto.admin.v1;

import "buf/validate/validate.proto";

// Request to read owner-only server diagnostics.
message GetSystemInfoRequest {}

// Owner-only operational diagnostics for the Towk server.
message GetSystemInfoResponse {
  // Broker connection, account, and JetStream state.
  AdminSystemInfo system_info = 1;
  // Event-sourced projection health and memory estimates.
  repeated AdminProjectionState projections = 2;
}

// Runtime performance profile exposed to server owners.
enum AdminPerformanceProfile {
  ADMIN_PERFORMANCE_PROFILE_UNSPECIFIED = 0;
  ADMIN_PERFORMANCE_PROFILE_ECONOMY = 1;
  ADMIN_PERFORMANCE_PROFILE_BALANCED = 2;
  ADMIN_PERFORMANCE_PROFILE_PERFORMANCE = 3;
  ADMIN_PERFORMANCE_PROFILE_CUSTOM = 4;
  ADMIN_PERFORMANCE_PROFILE_LEGACY = 5;
}

// Source of the currently requested runtime policy.
enum AdminPerformancePolicySource {
  ADMIN_PERFORMANCE_POLICY_SOURCE_UNSPECIFIED = 0;
  ADMIN_PERFORMANCE_POLICY_SOURCE_HISTORICAL = 1;
  ADMIN_PERFORMANCE_POLICY_SOURCE_OPERATOR_DEFAULT = 2;
  ADMIN_PERFORMANCE_POLICY_SOURCE_OWNER = 3;
}

// Runtime work pools controlled by a performance policy.
enum AdminPerformanceLimitField {
  ADMIN_PERFORMANCE_LIMIT_FIELD_UNSPECIFIED = 0;
  ADMIN_PERFORMANCE_LIMIT_FIELD_IMAGE_TRANSFORM_WORKERS = 1;
  ADMIN_PERFORMANCE_LIMIT_FIELD_IMAGE_TRANSFORM_ADMISSIONS = 2;
  ADMIN_PERFORMANCE_LIMIT_FIELD_ASSET_UPLOAD_WORKERS = 3;
  ADMIN_PERFORMANCE_LIMIT_FIELD_LINK_PREVIEW_WORKERS = 4;
  ADMIN_PERFORMANCE_LIMIT_FIELD_VIDEO_WORKERS = 5;
}

// Reason why an effective value is below its requested value.
enum AdminPerformanceCapReason {
  ADMIN_PERFORMANCE_CAP_REASON_UNSPECIFIED = 0;
  ADMIN_PERFORMANCE_CAP_REASON_OPERATOR_CAP = 1;
  ADMIN_PERFORMANCE_CAP_REASON_PROCESS_CPU = 2;
  ADMIN_PERFORMANCE_CAP_REASON_PROCESS_MEMORY = 3;
}

// Bounded worker values for one runtime performance policy.
message AdminPerformanceLimits {
  int32 image_transform_workers = 1;
  int32 image_transform_admissions = 2;
  int32 asset_upload_workers = 3;
  int32 link_preview_workers = 4;
  int32 video_workers = 5;
}

// Process-visible resource envelope used to compute effective values.
message AdminPerformanceEnvelope {
  int32 cpus = 1;
  int64 memory_bytes = 2;
  string cpu_source = 3;
  string memory_source = 4;
}

// Reduction reasons for one runtime work pool.
message AdminPerformanceLimitCap {
  AdminPerformanceLimitField field = 1;
  repeated AdminPerformanceCapReason reasons = 2;
}

// Requested and effective performance state. Operator caps use zero to mean
// automatic process-envelope derivation, never unlimited.
message AdminPerformanceSettings {
  AdminPerformanceProfile requested_profile = 1;
  AdminPerformanceProfile effective_profile = 2;
  AdminPerformancePolicySource source = 3;
  uint32 schema_version = 4;
  string revision = 5;
  AdminPerformanceLimits requested_limits = 6;
  AdminPerformanceLimits effective_limits = 7;
  AdminPerformanceLimits operator_caps = 8;
  AdminPerformanceEnvelope envelope = 9;
  repeated AdminPerformanceLimitCap caps = 10;
  string policy_error = 11;
  bool restart_required = 12;
}

message GetPerformanceSettingsRequest {}

message GetPerformanceSettingsResponse {
  AdminPerformanceSettings settings = 1;
}

message UpdatePerformanceSettingsRequest {
  AdminPerformanceProfile profile = 1 [(buf.validate.field).enum = {defined_only: true, not_in: [0, 5]}];
  AdminPerformanceLimits custom_limits = 2;
  string expected_revision = 3 [(buf.validate.field).string = {min_len: 1, max_len: 20}];
}

message UpdatePerformanceSettingsResponse {
  AdminPerformanceSettings settings = 1;
}

// Broker and application diagnostics shown on the server admin system page.
message AdminSystemInfo {
  // Current NATS server connection metadata.
  AdminConnectionInfo connection = 1;
  // JetStream account limits and usage.
  AdminAccountInfo account = 2;
  // JetStream stream and consumer diagnostics.
  AdminNatsStats nats = 3;
  // Aggregate Towk object counts.
  AdminServerStats stats = 4;
}

// Current NATS server connection metadata.
message AdminConnectionInfo {
  // Whether Towk is currently connected to NATS.
  bool connected = 1;
  // Connected NATS server ID.
  string server_id = 2;
  // Connected NATS server name.
  string server_name = 3;
  // Connected NATS server version.
  string version = 4;
  // Maximum payload accepted by the connected NATS server.
  int64 max_payload = 5;
  // Round-trip latency to the connected NATS server.
  string rtt = 6;
}

// JetStream account limits and usage.
message AdminAccountInfo {
  // Maximum memory storage in bytes. Values less than or equal to zero mean unlimited.
  int64 memory = 1;
  // Used memory storage in bytes.
  int64 memory_used = 2;
  // Maximum file storage in bytes. Values less than or equal to zero mean unlimited.
  int64 storage = 3;
  // Used file storage in bytes.
  int64 storage_used = 4;
  // Maximum number of streams. Values less than or equal to zero mean unlimited.
  int32 streams = 5;
  // Current number of streams.
  int32 streams_used = 6;
  // Maximum number of consumers. Values less than or equal to zero mean unlimited.
  int32 consumers = 7;
  // Current number of consumers.
  int32 consumers_used = 8;
}

// Aggregate Towk object counts.
message AdminServerStats {
  // Registered user count.
  int32 user_count = 1;
  // Channel room count.
  int32 channel_room_count = 2;
  // Direct-message room count.
  int32 dm_room_count = 3;
}

// JetStream stream and consumer diagnostics.
message AdminNatsStats {
  // Total messages stored across all streams.
  int64 total_messages = 1;
  // Total bytes stored across all streams.
  int64 total_bytes = 2;
  // Total pending messages across all consumers.
  int64 total_consumer_pending = 3;
  // Total messages currently waiting for acknowledgement.
  int32 total_ack_pending = 4;
  // Streams sorted by name.
  repeated AdminNatsStreamInfo streams = 5;
  // Consumers sorted by stream and name.
  repeated AdminNatsConsumerInfo consumers = 6;
}

// JetStream stream state.
message AdminNatsStreamInfo {
  // Stream name.
  string name = 1;
  // Stream description.
  string description = 2;
  // Subjects stored in the stream.
  repeated string subjects = 3;
  // Storage backend name.
  string storage = 4;
  // Number of messages in the stream.
  int64 messages = 5;
  // Number of bytes in the stream.
  int64 bytes = 6;
  // First stream sequence.
  string first_sequence = 7;
  // Last stream sequence.
  string last_sequence = 8;
  // Number of stream consumers.
  int32 consumer_count = 9;
  // Configured stream replica count.
  int32 replicas = 10;
  // Current cluster leader, when reported by NATS.
  string cluster_leader = 11;
}

// JetStream consumer state.
message AdminNatsConsumerInfo {
  // Stream that owns the consumer.
  string stream = 1;
  // Consumer name.
  string name = 2;
  // Durable name, when the consumer is durable.
  string durable = 3;
  // Single filter subject, when configured.
  string filter_subject = 4;
  // Multiple filter subjects, when configured.
  repeated string filter_subjects = 5;
  // NATS acknowledgement policy.
  string ack_policy = 6;
  // Whether this is a pull consumer.
  bool pull_based = 7;
  // Whether this push consumer has an active subscription.
  bool push_bound = 8;
  // Pending messages for this consumer.
  int64 pending = 9;
  // Messages waiting for acknowledgement.
  int32 ack_pending = 10;
  // Redelivered message count.
  int32 redelivered = 11;
  // Pull requests waiting for messages.
  int32 waiting = 12;
  // Delivered consumer sequence.
  string delivered_consumer_sequence = 13;
  // Delivered stream sequence.
  string delivered_stream_sequence = 14;
  // Acknowledgement floor consumer sequence.
  string ack_floor_consumer_sequence = 15;
  // Acknowledgement floor stream sequence.
  string ack_floor_stream_sequence = 16;
}

// Event-sourced projection health and memory estimates.
message AdminProjectionState {
  // Stable projection key.
  string key = 1;
  // Display name.
  string name = 2;
  // EVT subjects consumed by this projection.
  repeated string subjects = 3;
  // Whether the projection projector is running.
  bool started = 4;
  // Startup duration in seconds, set after startup completes.
  optional double startup_duration_seconds = 5;
  // Last event sequence applied by the projection.
  string last_applied_sequence = 6;
  // Target sequence among the projection's matching subjects.
  string matching_stream_sequence = 7;
  // Current last sequence of the EVT stream.
  string stream_last_sequence = 8;
  // Matching-subject lag between target and applied sequence.
  int64 lag = 9;
  // Whether the projection failed.
  bool failed = 10;
  // Sequence that failed, when failed is true.
  string failed_sequence = 11;
  // Failure message, when failed is true.
  string failure = 12;
  // Estimated number of entries held by the projection.
  int64 entry_count = 13;
  // Estimated memory used by the projection in bytes.
  int64 estimated_bytes = 14;
  // Estimated average memory per entry in bytes.
  int64 average_entry_bytes = 15;
  // Projection-specific diagnostic metrics.
  repeated AdminProjectionMetric metrics = 16;
}

// Projection-specific diagnostic metric.
message AdminProjectionMetric {
  // Metric name.
  string name = 1;
  // Metric value.
  int64 value = 2;
  // Estimated memory represented by this metric in bytes.
  int64 bytes = 3;
}

// Provides server diagnostics for the admin system page.
service AdminDiagnosticsService {
  // Returns broker, JetStream, and projection diagnostics. Requires the
  // server owner role.
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse);
  // Returns requested and effective runtime limits. Requires owner.
  rpc GetPerformanceSettings(GetPerformanceSettingsRequest) returns (GetPerformanceSettingsResponse);
  // Changes the owner-requested policy with optimistic concurrency. Requires owner.
  rpc UpdatePerformanceSettings(UpdatePerformanceSettingsRequest) returns (UpdatePerformanceSettingsResponse);
}
