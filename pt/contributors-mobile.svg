<svg xmlns="http://www.w3.org/2000/svg" width="420" height="805" viewBox="0 0 420 805" role="img" aria-labelledby="title desc">
  <title id="title">Quem faz o Towk avançar</title>
  <desc id="desc">Autores humanos desde o repositório independente</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43d8b0"/>
      <stop offset="50%" stop-color="#4aa8ff"/>
      <stop offset="100%" stop-color="#7867f2"/>
    </linearGradient>
    <linearGradient id="accent-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43d8b0" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#7867f2" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    
  </defs>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .panel-strong { fill: #eef7ff; stroke: #b6d8ff; }
    .ink { fill: #18212f; }
    .muted { fill: #667085; }
    .faint { fill: #98a2b3; }
    .grid { stroke: #dfe5ec; }
    .track { fill: #e7edf3; }
    .title { font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .kpi { font: 800 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { font: 650 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hero-eyebrow { font: 800 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 2px; }
    .hero-title { font: 850 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hero-subtitle { font: 550 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .chip { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .panel-strong { fill: #10263a; stroke: #244d70; }
      .ink { fill: #f0f6fc; }
      .muted { fill: #a7b0bc; }
      .faint { fill: #7d8590; }
      .grid { stroke: #30363d; }
      .track { fill: #27313d; }
    }
  </style>
  <rect class="bg" x="1" y="1" width="418" height="803" rx="22"/>
  <rect x="0" y="0" width="420" height="8" rx="4" fill="url(#accent)"/>
  <text class="title ink" x="22" y="43" style="font-size:22px">Quem faz o Towk avançar</text>
  <text class="subtitle muted" x="22" y="65" style="font-size:11px">Autores humanos desde o repositório independente</text>
  <g><rect class="panel" x="22" y="88" width="376" height="306" rx="18"/><text class="label ink" x="40" y="121">Autores de commits</text><g><text class="body ink" x="40" y="159">Yo-DDV</text><text class="label muted" x="380" y="159" text-anchor="end">91</text><rect class="track" x="40" y="169" width="340" height="10" rx="5"/><rect x="40" y="169" width="340.0" height="10" rx="5" fill="#43d8b0"/></g>
<g><text class="body ink" x="40" y="203">hmans</text><text class="label muted" x="380" y="203" text-anchor="end">3</text><rect class="track" x="40" y="213" width="340" height="10" rx="5"/><rect x="40" y="213" width="11.2" height="10" rx="5" fill="#43d8b0"/></g></g>
  <g><rect class="panel" x="22" y="412" width="376" height="306" rx="18"/><text class="label ink" x="40" y="445">Autores de PR integradas</text><g><text class="body ink" x="40" y="483">Yo-DDV</text><text class="label muted" x="380" y="483" text-anchor="end">76</text><rect class="track" x="40" y="493" width="340" height="10" rx="5"/><rect x="40" y="493" width="340.0" height="10" rx="5" fill="#7867f2"/></g></g>
  <g><rect class="panel-strong" x="22" y="736" width="376" height="48" rx="16"/><text class="small ink" x="40" y="757">Automatização: 15 commits · 15 PR</text><text class="small muted" x="40" y="775">Os bots são apresentados separadamente.</text></g>
  <text class="small faint" x="22" y="799">Atualizado 24/07/2026, 23:38</text>
</svg>
